<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<title>Control General de Rendimientos | PVT</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:'Inter',system-ui,sans-serif;background:#07100a;color:#e0ead0;}
::-webkit-scrollbar{width:7px;height:7px;}
::-webkit-scrollbar-thumb{background:rgba(74,222,128,0.25);border-radius:4px;}
input[type=number]::-webkit-inner-spin-button{opacity:1;}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade{animation:fadein .28s ease both;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState;
var useEffect=React.useEffect;
var useMemo=React.useMemo;

var FB="https://parrasvalley-default-rtdb.firebaseio.com";
var PIN="1986";
var CULTIVOS=["Persa","Slicer","Europeo","Morron","Minibel"];
var CCOLORS={Persa:"#22c55e",Slicer:"#38bdf8",Europeo:"#a78bfa",Morron:"#f97316",Minibel:"#f43f5e"};

// ── pesos kg por presentacion ─────────────────────────────────────────────────
var PESOS={
  "20lb":9.25,"20 lb":9.25,"8x2":7.60,"12x1":5.70,"12x1lb":5.76,
  "12x8oz":2.88,"18lb":8.16,"18 lb":8.16,"25lb":11.34,"50lb":22.68,
  "Bushel":27.0,"1/9 bushel":9.07,"RPC 35lb":15.87,"Verde RPC":13.61,
  "L":5.13,"XL":5.13,"Jumbo":5.13,"8x6":5.44,"12x2":5.44
};
// piezas por caja para productos de conteo
var PZ_CAJA={"18ct":18,"24ct":24,"36ct":36,"62ct":62,"12ct":12,"62 piezas":62};

// calidades de produccion.html por cultivo
var CAL_MAP={
  Persa:{"Primera":"pri","Segunda":"seg","Tercera":"ter"},
  Slicer:{"Superselecto":"sup","Super":"sup","Selecto":"sel","Large":"sel","Choice":"cho","Plain":"cho","Small":"cho"},
  Europeo:{"Primera":"pri","Segunda":"seg","Tercera":"ter","Choice":"ter"},
  Morron:{"Primera":"pri","Segunda":"pri","Choice":"cho","Tercera":"ter"},
  Minibel:{"Primera":"pri","Segunda":"seg"}
};
var CAL_LABELS={
  Persa:[{id:"pri",l:"1a Primera",c:"#22c55e"},{id:"seg",l:"2a Segunda",c:"#60a5fa"},{id:"ter",l:"3a Tercera",c:"#f59e0b"}],
  Slicer:[{id:"sup",l:"Superselecto",c:"#22c55e"},{id:"sel",l:"Selecto/Large",c:"#60a5fa"},{id:"cho",l:"Choice/Plain",c:"#f59e0b"}],
  Europeo:[{id:"pri",l:"1a Primera",c:"#22c55e"},{id:"seg",l:"2a Segunda",c:"#60a5fa"},{id:"ter",l:"3a Tercera",c:"#f59e0b"}],
  Morron:[{id:"pri",l:"1a Primera",c:"#22c55e"},{id:"cho",l:"Choice",c:"#60a5fa"},{id:"ter",l:"Tercera",c:"#f59e0b"}],
  Minibel:[{id:"pri",l:"1a Primera",c:"#22c55e"},{id:"seg",l:"2a Segunda",c:"#60a5fa"}]
};

// ── helpers ───────────────────────────────────────────────────────────────────
function r2(n){return Math.round((n||0)*100)/100;}
function pct(a,b){return b>0?Math.round((a||0)/(b||1)*1000)/10:0;}
function ni(v){var x=parseInt(v);return isNaN(x)?0:x;}
function nf(v){var x=parseFloat(v);return isNaN(x)?0:x;}
function hoy(){
  var d=new Date();
  var m=d.getMonth()+1;var dd=d.getDate();
  return d.getFullYear()+"-"+(m<10?"0":"")+m+"-"+(dd<10?"0":"")+dd;
}
function tsToISO(ts){
  if(!ts)return "";
  var d=new Date(ts);
  var m=d.getMonth()+1;var dd=d.getDate();
  return d.getFullYear()+"-"+(m<10?"0":"")+m+"-"+(dd<10?"0":"")+dd;
}
function fbGet(k){
  return fetch(FB+"/"+k+".json")
    .then(function(r){return r.json();})
    .catch(function(){return null;});
}
function fbPut(k,v){
  return fetch(FB+"/"+k+".json",{
    method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)
  }).catch(function(){});
}

// ── calcular kg de un pallet en produccion-v1 ─────────────────────────────────
function palletKg(pallet){
  var cajas=ni(pallet.cajas)||0;
  var pres=pallet.presentacion||"";
  if(PESOS[pres])return r2(cajas*PESOS[pres]);
  if(PZ_CAJA[pres])return 0; // piezas: se calculan con peso pieza del usuario
  return 0;
}
function palletPiezas(pallet){
  var cajas=ni(pallet.cajas)||0;
  var pres=pallet.presentacion||"";
  return PZ_CAJA[pres]?cajas*(PZ_CAJA[pres]||0):0;
}

// ── componente grafica de barras ──────────────────────────────────────────────
function Barras(props){
  var datos=props.datos; // [{label, valor, color}]
  var titulo=props.titulo;
  if(!datos||datos.length===0)return null;
  var maxV=Math.max.apply(null,datos.map(function(d){return d.valor||0;}))||1;
  return(
    <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:"12px",marginBottom:12}}>
      <div style={{fontSize:11,color:"#4a6a3a",fontWeight:700,marginBottom:10}}>{titulo}</div>
      <div style={{display:"flex",gap:6,alignItems:"flex-end",height:90,overflowX:"auto"}}>
        {datos.map(function(d,i){
          var h=Math.max((d.valor/maxV)*80,2);
          return(
            <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,minWidth:38}}>
              <span style={{fontSize:9,color:d.color||"#4ade80",fontWeight:700}}>{d.valor}{d.sufijo||""}</span>
              <div style={{width:28,height:h,background:d.color||"#4ade80",borderRadius:"3px 3px 0 0",alignSelf:"flex-end"}}></div>
              <span style={{fontSize:8,color:"#4a5a3a",whiteSpace:"nowrap"}}>{d.label}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  var fechaState=useState(hoy()); var fecha=fechaState[0]; var setFecha=fechaState[1];
  var cultivoState=useState("Persa"); var cultivo=cultivoState[0]; var setCultivo=cultivoState[1];
  var tabState=useState("captura"); var tab=tabState[0]; var setTab=tabState[1];
  var authState=useState(false); var auth=authState[0]; var setAuth=authState[1];
  var pinState=useState(""); var pinInput=pinState[0]; var setPinInput=pinState[1];
  var showPinState=useState(false); var showPin=showPinState[0]; var setShowPin=showPinState[1];
  var msgState=useState(""); var msg=msgState[0]; var setMsg=msgState[1];
  var jalandoState=useState(""); var jalando=jalandoState[0]; var setJalando=jalandoState[1];
  var guardandoState=useState(false); var guardando=guardandoState[0]; var setGuardando=guardandoState[1];
  // datos de Firebase
  var reciboState=useState({}); var reciboData=reciboState[0]; var setReciboData=reciboState[1];
  var prodState=useState({}); var prodData=prodState[0]; var setProdData=prodState[1];
  var histState=useState({}); var historial=histState[0]; var setHistorial=histState[1];
  // inputs de peso por rancho: {cultivo: {rancho: {pesoReja, piezasReja}}}
  var inpState=useState({}); var inputs=inpState[0]; var setInputs=inpState[1];

  var calidades=CAL_LABELS[cultivo]||[];
  var calMap=CAL_MAP[cultivo]||{};
  var cc=CCOLORS[cultivo]||"#22c55e";

  // cargar historial al iniciar
  useEffect(function(){
    fbGet("rendimientos-hist-v1").then(function(d){
      if(d&&typeof d==="object")setHistorial(d);
    });
  },[]);

  function flash(m){setMsg(m);setTimeout(function(){setMsg("");},4000);}

  function getInp(rancho,k){
    var c=inputs[cultivo];if(!c)return "";
    var r=c[rancho];if(!r)return "";
    return r[k]||"";
  }
  function setInp(rancho,k,v){
    setInputs(function(prev){
      var n=JSON.parse(JSON.stringify(prev));
      if(!n[cultivo])n[cultivo]={};
      if(!n[cultivo][rancho])n[cultivo][rancho]={};
      n[cultivo][rancho][k]=v;
      return n;
    });
  }

  // ── JALAR RECIBO ──────────────────────────────────────────────────────────
  function jalarRecibo(){
    setJalando("recibo");
    Promise.all([fbGet("recibo-inv-v1"),fbGet("recibo-hist-v1")]).then(function(vals){
      var invActivo=vals[0];
      var histCerrado=vals[1];
      var cNorm=cultivo.toLowerCase();
      var res={};

      // Inventario activo (no cerrado): {persa:{lotes:[{rancho,malla,cajas,ts}]}}
      if(invActivo&&typeof invActivo==="object"){
        var linea=invActivo[cNorm]||{};
        var lotes=linea.lotes||[];
        if(!Array.isArray(lotes))lotes=Object.values(lotes).filter(Boolean);
        lotes.forEach(function(l){
          if(!l||!l.rancho)return;
          if(tsToISO(l.ts)!==fecha)return;
          if(!res[l.rancho])res[l.rancho]={rejas:0,malla:""};
          res[l.rancho].rejas+=ni(l.cajas);
          if(l.malla)res[l.rancho].malla=l.malla;
        });
      }

      // Historial cerrado: [{lineaNombre:"Persa", lotes:[...]}]
      if(histCerrado){
        var arr=Array.isArray(histCerrado)?histCerrado:Object.values(histCerrado).filter(Boolean);
        arr.forEach(function(h){
          if(!h)return;
          if((h.lineaNombre||"").toLowerCase()!==cNorm)return;
          var lotes2=h.lotes||[];
          if(!Array.isArray(lotes2))lotes2=Object.values(lotes2).filter(Boolean);
          lotes2.forEach(function(l){
            if(!l||!l.rancho)return;
            if(tsToISO(l.ts)!==fecha)return;
            if(!res[l.rancho])res[l.rancho]={rejas:0,malla:""};
            res[l.rancho].rejas+=ni(l.cajas);
            if(l.malla)res[l.rancho].malla=l.malla;
          });
        });
      }

      setReciboData(function(prev){
        var n=Object.assign({},prev);
        n[cultivo]=Object.assign({},n[cultivo]||{},res);
        return n;
      });
      setJalando("");
      var cnt=Object.keys(res).length;
      flash(cnt>0?"Recibo: "+cnt+" rancho(s) para "+fecha:"Sin recibo para "+cultivo+" el "+fecha);
    }).catch(function(){setJalando("");flash("Error al conectar con recibo");});
  }

  // ── JALAR PRODUCCION ──────────────────────────────────────────────────────
  function jalarProduccion(){
    setJalando("prod");
    fbGet("produccion-v1").then(function(data){
      if(!data){setJalando("");flash("Sin datos en produccion-v1");return;}

      // Estructura: {Persa:{inventario:[...],bajados:[...],registros:[...]}}
      var prodObj=data[cultivo];
      if(!prodObj){setJalando("");flash("Sin datos de "+cultivo+" en produccion-v1");return;}

      var toArr=function(x){
        if(!x)return [];
        if(Array.isArray(x))return x.filter(Boolean);
        return Object.values(x).filter(Boolean);
      };

      // Combinar inventario + bajados + registros para capturar todo lo empacado ese dia
      var todos=toArr(prodObj.inventario)
        .concat(toArr(prodObj.bajados))
        .concat(toArr(prodObj.registros));

      // Filtrar: fecha del dia + excluir SOLO reproceso de dias anteriores
      // "embolsado" = 12x1/8x2 fruta del dia via sub-pestaña Embolsado → INCLUIR
      // "conversion_hoy" = conversión de 20lb del mismo dia → INCLUIR
      // "reproceso" = retroeso de dias anteriores → EXCLUIR
      var excluidos=0;
      var filtrados=todos.filter(function(r){
        if(!r)return false;
        var f=r.fecha||r.fechaInventario||"";
        if(f!==fecha)return false;
        if((r.tipo||"")==="reproceso"){excluidos++;return false;}
        return true;
      });
      var totalEnFecha=todos.filter(function(r){return r&&(r.fecha||r.fechaInventario||"")===fecha;}).length;
      var tiposVistos={};
      todos.filter(function(r){return r&&(r.fecha||r.fechaInventario||"")===fecha;}).forEach(function(r){
        var t=r.tipo||"(sin tipo)";tiposVistos[t]=(tiposVistos[t]||0)+1;
      });

      if(filtrados.length===0){
        setJalando("");
        flash("Sin fruta del dia para "+cultivo+" el "+fecha);
        return;
      }

      // Agrupar: {rancho: {calId: {presentacion: cajas, piezas}}}
      var acum={};
      filtrados.forEach(function(r){
        var rancho=r.rancho||"SinRancho";
        var calId=calMap[r.calidad]||null;
        if(!calId)return;
        var pres=r.presentacion||"";
        if(!acum[rancho])acum[rancho]={malla:r.malla||""};
        if(!acum[rancho][calId])acum[rancho][calId]={};
        var prev=ni(acum[rancho][calId][pres])||0;
        acum[rancho][calId][pres]=prev+ni(r.cajas);
      });

      setProdData(function(prev){
        var n=Object.assign({},prev);
        n[cultivo]=Object.assign({},n[cultivo]||{},acum);
        return n;
      });
      setJalando("");
      setJalando("");
      var presEncontradas=[];
      Object.values(acum).forEach(function(rc){
        Object.keys(rc).forEach(function(calId){
          if(calId==="malla")return;
          Object.keys(rc[calId]).forEach(function(p){if(presEncontradas.indexOf(p)<0)presEncontradas.push(p);});
        });
      });
      var tiposStr=Object.keys(tiposVistos).map(function(t){return t+"("+tiposVistos[t]+")";}).join(", ")||"ninguno";
      flash("Produccion "+fecha+": "+totalEnFecha+" pallets en BD, "+excluidos+" excluidos, "+filtrados.length+" fruta-dia. Ranchos: "+(Object.keys(acum).join(", ")||"ninguno")+". Presentaciones: "+(presEncontradas.join(", ")||"ninguna")+". Tipos: "+tiposStr);
    }).catch(function(){setJalando("");flash("Error al conectar con produccion");});
  }

  // ── CALCULAR RENDIMIENTOS ─────────────────────────────────────────────────
  var calculos=useMemo(function(){
    var recC=reciboData[cultivo]||{};
    var prC=prodData[cultivo]||{};
    var ranchos={};
    Object.keys(recC).forEach(function(r){ranchos[r]=true;});
    Object.keys(prC).forEach(function(r){if(r!=="malla")ranchos[r]=true;});

    var res={};
    Object.keys(ranchos).forEach(function(rancho){
      var rec=recC[rancho]||{};
      var pr=prC[rancho]||{};
      var rejas=ni(rec.rejas)||0;
      var pesoReja=nf(getInp(rancho,"pesoReja"))||0;
      var piezasReja=nf(getInp(rancho,"piezasReja"))||0;
      var kgRec=r2(rejas*pesoReja);
      var pzRec=Math.round(rejas*piezasReja);
      var pesoPieza=pzRec>0?kgRec/pzRec:0;

      var detCal={};
      var kgEmpTotal=0;
      calidades.forEach(function(cal){
        var presAcum=pr[cal.id]||{};
        var kgC=0; var pzC=0;
        var desglose={};
        Object.keys(presAcum).forEach(function(pres){
          var cajas=ni(presAcum[pres]);
          var kgP=0; var pzP=0;
          if(PESOS[pres]){kgP=cajas*PESOS[pres];}
          else if(PZ_CAJA[pres]){pzP=cajas*PZ_CAJA[pres];kgP=pzP*pesoPieza;}
          kgC+=kgP; pzC+=pzP;
          if(cajas>0)desglose[pres]={cajas:cajas,kg:r2(kgP),pz:pzP};
        });
        detCal[cal.id]={kg:r2(kgC),pz:pzC,desglose:desglose};
        kgEmpTotal+=kgC;
      });
      kgEmpTotal=r2(kgEmpTotal);
      var kgMerma=r2(kgRec-kgEmpTotal);
      res[rancho]={
        malla:rec.malla||pr.malla||"",
        rejas:rejas, kgRec:kgRec, pzRec:pzRec, pesoPieza:r2(pesoPieza*1000)/1000,
        kgEmp:kgEmpTotal, kgMerma:kgMerma,
        pctMerma:pct(kgMerma,kgRec),
        factorRend:kgRec>0?Math.round(kgEmpTotal/kgRec*1000)/10:0,
        detCal:detCal
      };
    });
    return res;
  },[reciboData,prodData,inputs,cultivo,fecha,calMap,calidades]);

  // totales del dia
  var totales=useMemo(function(){
    var t={kgRec:0,kgEmp:0,kgMerma:0,detCal:{}};
    calidades.forEach(function(cal){t.detCal[cal.id]={kg:0,pct:0};});
    Object.values(calculos).forEach(function(d){
      t.kgRec+=d.kgRec; t.kgEmp+=d.kgEmp; t.kgMerma+=d.kgMerma;
      calidades.forEach(function(cal){
        t.detCal[cal.id].kg+=((d.detCal&&d.detCal[cal.id]&&d.detCal[cal.id].kg)||0);
      });
    });
    t.kgRec=r2(t.kgRec); t.kgEmp=r2(t.kgEmp); t.kgMerma=r2(t.kgMerma);
    t.pctMerma=pct(t.kgMerma,t.kgRec);
    t.factorRend=t.kgRec>0?Math.round(t.kgEmp/t.kgRec*1000)/10:0;
    calidades.forEach(function(cal){
      t.detCal[cal.id].pct=pct(t.detCal[cal.id].kg,t.kgEmp);
      t.detCal[cal.id].kg=r2(t.detCal[cal.id].kg);
    });
    return t;
  },[calculos,calidades]);

  // ── GUARDAR ──────────────────────────────────────────────────────────────
  function guardar(){
    if(!auth){setShowPin(true);return;}
    setGuardando(true);
    var entry={fecha:fecha,cultivo:cultivo,ts:Date.now(),totales:totales,ranchos:{}};
    Object.keys(calculos).forEach(function(r){
      if(calculos[r].kgRec>0||calculos[r].kgEmp>0)entry.ranchos[r]=calculos[r];
    });
    var key="rendimientos-hist-v1/"+fecha.replace(/-/g,"")+"/"+cultivo;
    fbPut(key,entry).then(function(){
      setHistorial(function(prev){
        var n=JSON.parse(JSON.stringify(prev));
        var dk=fecha.replace(/-/g,"");
        if(!n[dk])n[dk]={};
        n[dk][cultivo]=entry;
        return n;
      });
      setGuardando(false);flash("Guardado correctamente");
    });
  }

  // ── estilos ───────────────────────────────────────────────────────────────
  var S={
    hdr:{background:"linear-gradient(135deg,#051a09,#0a2e12)",padding:"13px 16px",
         borderBottom:"1px solid rgba(74,222,128,0.1)",position:"sticky",top:0,zIndex:10,
         boxShadow:"0 2px 12px rgba(0,0,0,0.5)"},
    inp:{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",
         borderRadius:6,padding:"6px 9px",color:"#e0ead0",fontSize:13,outline:"none",
         fontFamily:"'DM Mono',monospace",textAlign:"center"},
    td:{padding:"8px 10px",fontSize:12,borderBottom:"1px solid rgba(255,255,255,0.05)",
        verticalAlign:"middle"},
    th:{padding:"7px 10px",fontSize:10,fontWeight:700,textTransform:"uppercase",
        letterSpacing:.8,color:"#4a6a3a",borderBottom:"1px solid rgba(255,255,255,0.08)",
        background:"rgba(0,0,0,0.35)"}
  };

  function Btn(props){
    return(
      <button onClick={props.onClick} disabled={props.disabled}
        style={{background:props.bg||"rgba(255,255,255,0.07)",
                border:"1px solid "+(props.bc||"rgba(255,255,255,0.12)"),
                borderRadius:8,padding:"8px 14px",color:props.col||"#e0ead0",
                fontWeight:700,fontSize:12,cursor:props.disabled?"not-allowed":"pointer",
                opacity:props.disabled?0.5:1}}>
        {props.children}
      </button>
    );
  }

  // historial para el dashboard
  var diasHist=useMemo(function(){
    var keys=Object.keys(historial).sort(function(a,b){return b>a?1:-1;}).slice(0,14);
    return keys.map(function(k){
      var d=historial[k];
      if(!d||!d[cultivo])return null;
      return{fecha:d[cultivo].fecha||k.slice(0,4)+"-"+k.slice(4,6)+"-"+k.slice(6,8),
             tot:d[cultivo].totales};
    }).filter(Boolean);
  },[historial,cultivo]);

  var hayCalcuros=Object.keys(calculos).some(function(r){return calculos[r].kgRec>0||calculos[r].kgEmp>0;});

  // ── RENDER ────────────────────────────────────────────────────────────────
  return(
    <div style={{minHeight:"100vh",background:"#07100a"}}>

      {/* HEADER */}
      <div style={S.hdr}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:10}}>
          <div>
            <div style={{fontSize:9,color:"#4a8a5a",fontWeight:700,letterSpacing:3,textTransform:"uppercase"}}>Parras Valley Tomatoes</div>
            <div style={{fontSize:17,fontWeight:900,color:"#a8e063"}}>Control General de Rendimientos</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <div style={{fontSize:10,color:"#4a6a3a",fontWeight:600}}>Fecha:</div>
            <input type="date" value={fecha} onChange={function(e){setFecha(e.target.value);}}
              style={Object.assign({},S.inp,{width:"auto",padding:"7px 10px"})}/>
            {auth
              ? <span style={{fontSize:11,color:"#4ade80",fontWeight:700}}>Editor</span>
              : <Btn onClick={function(){setShowPin(true);}} bg="rgba(74,222,128,0.08)" bc="rgba(74,222,128,0.2)" col="#4ade80">Editar</Btn>
            }
          </div>
        </div>
        {/* cultivo tabs */}
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:6}}>
          {CULTIVOS.map(function(c){
            var on=cultivo===c;
            return(
              <button key={c} onClick={function(){setCultivo(c);}}
                style={{padding:"5px 12px",borderRadius:6,border:"1px solid "+(on?CCOLORS[c]:"rgba(255,255,255,0.08)"),
                        background:on?"rgba(255,255,255,0.07)":"transparent",
                        color:on?CCOLORS[c]:"#6a7a5a",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                {c}
              </button>
            );
          })}
          <div style={{flex:1}}></div>
          <button onClick={function(){setTab("captura");}}
            style={{padding:"5px 12px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",
                    border:"1px solid "+(tab==="captura"?"rgba(74,222,128,0.5)":"rgba(255,255,255,0.07)"),
                    background:tab==="captura"?"rgba(74,222,128,0.08)":"transparent",
                    color:tab==="captura"?"#4ade80":"#6a7a5a"}}>
            Captura
          </button>
          <button onClick={function(){setTab("evolucion");}}
            style={{padding:"5px 12px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",
                    border:"1px solid "+(tab==="evolucion"?"rgba(74,222,128,0.5)":"rgba(255,255,255,0.07)"),
                    background:tab==="evolucion"?"rgba(74,222,128,0.08)":"transparent",
                    color:tab==="evolucion"?"#4ade80":"#6a7a5a"}}>
            Evolucion
          </button>
        </div>
      </div>

      {/* MENSAJE */}
      {!!msg&&(
        <div style={{background:"rgba(74,222,128,0.08)",borderBottom:"1px solid rgba(74,222,128,0.15)",
                     padding:"8px 16px",fontSize:12,color:"#4ade80",fontWeight:600}}>
          {msg}
        </div>
      )}

      {/* PIN MODAL */}
      {showPin&&(
        <div onClick={function(e){if(e.target===e.currentTarget)setShowPin(false);}}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:50,
                  display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#0f1f0a",border:"1px solid rgba(74,222,128,0.3)",
                       borderRadius:12,padding:"28px 24px",minWidth:240,textAlign:"center"}}>
            <div style={{fontWeight:800,color:"#a8e063",marginBottom:14,fontSize:14}}>Acceso de Editor</div>
            <input type="password" value={pinInput}
              onChange={function(e){setPinInput(e.target.value);}}
              onKeyDown={function(e){
                if(e.key==="Enter"){
                  if(pinInput===PIN){setAuth(true);setShowPin(false);setPinInput("");flash("Acceso concedido");}
                  else{flash("PIN incorrecto");}
                }
              }}
              placeholder="PIN" style={Object.assign({},S.inp,{width:"100%",fontSize:18,marginBottom:12,textAlign:"center"})}/>
            <Btn onClick={function(){
                if(pinInput===PIN){setAuth(true);setShowPin(false);setPinInput("");flash("Acceso concedido");}
                else flash("PIN incorrecto");
              }} bg="rgba(74,222,128,0.12)" bc="rgba(74,222,128,0.3)" col="#4ade80">
              Entrar
            </Btn>
          </div>
        </div>
      )}

      {/* ═══════════════ TAB CAPTURA ═══════════════ */}
      {tab==="captura"&&(
        <div style={{padding:"12px 12px 40px"}}>
          {/* Botones jalar */}
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
            <Btn onClick={jalarRecibo} disabled={!!jalando}
              bg="rgba(234,179,8,0.08)" bc="rgba(234,179,8,0.25)" col="#fde047">
              {jalando==="recibo"?"Jalando recibo...":"Jalar de Recibo"}
            </Btn>
            <Btn onClick={jalarProduccion} disabled={!!jalando}
              bg="rgba(56,189,248,0.08)" bc="rgba(56,189,248,0.25)" col="#38bdf8">
              {jalando==="prod"?"Jalando produccion...":"Jalar de Produccion"}
            </Btn>
            <div style={{flex:1}}></div>
            {hayCalcuros&&(
              <Btn onClick={guardar} disabled={guardando}
                bg="rgba(74,222,128,0.1)" bc="rgba(74,222,128,0.3)" col="#4ade80">
                {guardando?"Guardando...":"Guardar dia"}
              </Btn>
            )}
          </div>

          {/* Inputs peso por rancho */}
          <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",
                       borderRadius:10,padding:"10px 12px",marginBottom:12}}>
            <div style={{fontSize:10,color:"#4a6a3a",fontWeight:700,letterSpacing:1.5,
                         textTransform:"uppercase",marginBottom:8}}>
              Peso de recibo por rancho
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {(Object.keys((reciboData[cultivo]||{})).length>0
                ? Object.keys(reciboData[cultivo]||{})
                : ["PVT","Cordillera","Forrajera"]
              ).map(function(rancho){
                var rec=(reciboData[cultivo]||{})[rancho]||{};
                return(
                  <div key={rancho} style={{background:"rgba(255,255,255,0.03)",borderRadius:8,
                                           padding:"10px 12px",minWidth:180}}>
                    <div style={{fontWeight:800,color:cc,fontSize:12,marginBottom:6}}>
                      {rancho}
                      {rec.malla&&<span style={{fontSize:10,color:"#4a6a3a",fontWeight:500}}> Malla {rec.malla}</span>}
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap"}}>
                      <div>
                        <div style={{fontSize:9,color:"#4a6a3a",marginBottom:2}}>Rejas/Bins</div>
                        <div style={{fontSize:16,fontWeight:900}}>{rec.rejas||"—"}</div>
                      </div>
                      <div>
                        <div style={{fontSize:9,color:"#4a6a3a",marginBottom:2}}>Peso/reja kg</div>
                        <input type="number" min="0" step="0.1" placeholder="0.0"
                          value={getInp(rancho,"pesoReja")}
                          onChange={function(e){setInp(rancho,"pesoReja",e.target.value);}}
                          style={Object.assign({},S.inp,{width:70})}/>
                      </div>
                      <div>
                        <div style={{fontSize:9,color:"#4a6a3a",marginBottom:2}}>Pzas/reja</div>
                        <input type="number" min="0" placeholder="0"
                          value={getInp(rancho,"piezasReja")}
                          onChange={function(e){setInp(rancho,"piezasReja",e.target.value);}}
                          style={Object.assign({},S.inp,{width:70})}/>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Sin datos */}
          {!hayCalcuros&&(
            <div style={{textAlign:"center",padding:"48px 0",color:"#2a3a2a",fontSize:13}}>
              <div style={{fontSize:36,marginBottom:10}}>Jala recibo y produccion, luego ingresa el peso por reja</div>
            </div>
          )}

          {/* Resultados por rancho - compacto */}
          {Object.keys(calculos).map(function(rancho){
            var d=calculos[rancho];
            if(d.kgRec===0&&d.kgEmp===0)return null;
            var prRaw=((prodData[cultivo]||{})[rancho])||{};
            return(
              <div key={rancho} className="fade"
                style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.08)",
                        borderRadius:8,marginBottom:8,overflow:"hidden",maxWidth:480}}>
                <div style={{padding:"7px 12px",background:"rgba(0,0,0,0.4)",
                             display:"flex",alignItems:"center",gap:8,
                             borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
                  <span style={{fontWeight:900,color:cc,fontSize:14}}>{rancho}</span>
                  {d.malla&&<span style={{fontSize:11,color:"#4a5a3a"}}>M{d.malla}</span>}
                  <span style={{fontSize:11,color:"#6a7a5a"}}>{d.rejas} rejas · {d.kgRec} kg</span>
                  <div style={{flex:1}}/>
                  <span style={{fontSize:12,fontWeight:800,
                    color:d.pctMerma>20?"#ef4444":d.pctMerma>12?"#f59e0b":"#4ade80"}}>
                    Merma {d.pctMerma}%
                  </span>
                </div>
                <div style={{height:5,display:"flex",background:"rgba(239,68,68,0.2)"}}>
                  {calidades.map(function(cal){
                    var p=pct((d.detCal[cal.id]||{kg:0}).kg,d.kgRec);
                    if(p<=0)return null;
                    return <div key={cal.id} style={{width:p+"%",background:cal.c}}/>;
                  })}
                </div>
                <div style={{padding:"8px 10px"}}>
                  {(function(){
                    var pres=[];
                    calidades.forEach(function(cal){
                      var pr=prRaw[cal.id]||{};
                      Object.keys(pr).forEach(function(p){
                        if(ni(pr[p])>0)pres.push(cal.l.split(" ")[0]+" "+p+"("+pr[p]+")");
                      });
                    });
                    if(pres.length===0)return null;
                    return <div style={{fontSize:10,color:"#4a5a3a",marginBottom:5,padding:"2px 4px",background:"rgba(255,255,255,0.03)",borderRadius:3}}>Datos: {pres.join(" · ")}</div>;
                  })()}
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead>
                      <tr style={{borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
                        <th style={{padding:"3px 4px",textAlign:"left",fontSize:10,color:"#4a6a3a",fontWeight:700}}>Calidad · Presentación</th>
                        <th style={{padding:"3px 4px",textAlign:"right",fontSize:10,color:"#4a6a3a",fontWeight:700}}>Cajas</th>
                        <th style={{padding:"3px 4px",textAlign:"right",fontSize:10,color:"#4a6a3a",fontWeight:700}}>Kg</th>
                        <th style={{padding:"3px 4px",textAlign:"right",fontSize:10,color:"#4a6a3a",fontWeight:700}}>% rec.</th>
                        <th style={{padding:"3px 4px",textAlign:"right",fontSize:10,color:"#a8e063",fontWeight:700}}>Factor</th>
                      </tr>
                    </thead>
                    <tbody>
                      {calidades.map(function(cal){
                        var det=d.detCal[cal.id]||{kg:0,desglose:{}};
                        var des=det.desglose||{};
                        var presKeys=Object.keys(des).filter(function(k){return(des[k].cajas||0)>0;});
                        if(presKeys.length===0&&det.kg===0)return null;
                        var factor=d.rejas>0&&det.kg>0?r2((det.kg/9.25)/d.rejas):0;
                        var pCalRec=pct(det.kg,d.kgRec);
                        var totCaj=presKeys.reduce(function(s,p){return s+(des[p].cajas||0);},0);
                        return [
                          presKeys.map(function(pres){
                            var pd=des[pres];
                            return(
                              <tr key={cal.id+"_"+pres} style={{borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                                <td style={{padding:"4px 4px 4px 10px",fontSize:13}}>
                                  <span style={{color:cal.c,fontWeight:700,fontSize:11,marginRight:4}}>{cal.l.split(" ")[0]}</span>
                                  {pres}
                                </td>
                                <td style={{padding:"4px",textAlign:"right",fontSize:15,fontWeight:700,fontFamily:"'DM Mono',monospace",color:"#e0ead0"}}>{pd.cajas}</td>
                                <td style={{padding:"4px",textAlign:"right",fontSize:14,fontFamily:"'DM Mono',monospace",color:"#b0c890"}}>{pd.kg}</td>
                                <td style={{padding:"4px",textAlign:"right",fontSize:11,color:"#3a4a2a"}}>—</td>
                                <td style={{padding:"4px",textAlign:"right",fontSize:11,color:"#3a4a2a"}}>—</td>
                              </tr>
                            );
                          }),
                          <tr key={cal.id+"_T"} style={{background:"rgba(255,255,255,0.05)",borderTop:"1px solid rgba(255,255,255,0.12)"}}>
                            <td style={{padding:"5px 4px",fontWeight:900,color:cal.c,fontSize:14}}>Total {cal.l.split(" ")[0]}</td>
                            <td style={{padding:"5px 4px",textAlign:"right",fontWeight:800,fontSize:15,fontFamily:"'DM Mono',monospace",color:"#e0ead0"}}>{totCaj}</td>
                            <td style={{padding:"5px 4px",textAlign:"right",fontWeight:900,fontSize:16,fontFamily:"'DM Mono',monospace",color:cal.c}}>{det.kg}</td>
                            <td style={{padding:"5px 4px",textAlign:"right",fontWeight:800,fontSize:14,color:cal.c}}>{pCalRec}%</td>
                            <td style={{padding:"5px 4px",textAlign:"right",fontWeight:900,fontSize:15,fontFamily:"'DM Mono',monospace",color:"#a8e063"}}>{factor}</td>
                          </tr>
                        ];
                      })}
                      {/* Merma — sin factor */}
                      <tr style={{borderTop:"1px solid rgba(239,68,68,0.25)"}}>
                        <td style={{padding:"6px 4px",fontWeight:700,color:"#ef4444",fontSize:14}}>Merma</td>
                        <td style={{padding:"6px 4px",textAlign:"right",color:"#4a5a3a",fontSize:12}}>—</td>
                        <td style={{padding:"6px 4px",textAlign:"right",fontWeight:900,fontSize:16,fontFamily:"'DM Mono',monospace",color:"#ef4444"}}>{d.kgMerma}</td>
                        <td style={{padding:"6px 4px",textAlign:"right",fontWeight:800,fontSize:14,
                          color:d.pctMerma>20?"#ef4444":d.pctMerma>12?"#f59e0b":"#4ade80"}}>{d.pctMerma}%</td>
                        <td style={{padding:"6px 4px",textAlign:"right",color:"#2a3a2a",fontSize:11}}>—</td>
                      </tr>
                      <tr style={{borderTop:"1px solid rgba(74,222,128,0.2)",background:"rgba(74,222,128,0.04)"}}>
                        <td style={{padding:"5px 4px",fontWeight:900,color:"#4ade80",fontSize:14}}>Empacado</td>
                        <td style={{padding:"5px 4px",textAlign:"right",fontSize:13,fontFamily:"'DM Mono',monospace",color:"#6a7a5a"}}>
                          {calidades.reduce(function(s,cal){var dt=d.detCal[cal.id]||{desglose:{}};return s+Object.keys(dt.desglose||{}).reduce(function(ss,p){return ss+(dt.desglose[p].cajas||0);},0);},0)}
                        </td>
                        <td style={{padding:"5px 4px",textAlign:"right",fontWeight:900,fontSize:16,fontFamily:"'DM Mono',monospace",color:"#4ade80"}}>{d.kgEmp}</td>
                        <td style={{padding:"5px 4px",textAlign:"right",fontWeight:700,fontSize:14,color:"#4ade80"}}>{d.factorRend}%</td>
                        <td style={{padding:"5px 4px",textAlign:"right",color:"#2a3a2a",fontSize:11}}>—</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            );
          })}

          {/* TOTALES */}
          {hayCalcuros&&(
            <div style={{background:"rgba(74,222,128,0.04)",border:"1px solid rgba(74,222,128,0.15)",
                         borderRadius:10,padding:"13px",marginTop:4}}>
              <div style={{fontSize:10,color:"#4a8a5a",fontWeight:900,letterSpacing:1.5,
                           textTransform:"uppercase",marginBottom:10}}>
                Totales del dia — {cultivo}
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                {[
                  ["Recibido",totales.kgRec+" kg","#9ca3af"],
                  ["Empacado",totales.kgEmp+" kg","#4ade80"],
                  ["Merma",totales.kgMerma+" kg ("+totales.pctMerma+"%)",totales.pctMerma>20?"#ef4444":totales.pctMerma>12?"#f59e0b":"#4ade80"],
                  ["Factor",totales.factorRend+"%","#22c55e"]
                ].map(function(x){
                  return(
                    <div key={x[0]} style={{background:"rgba(0,0,0,0.3)",borderRadius:8,padding:"7px 13px"}}>
                      <div style={{fontSize:9,color:"#4a6a3a",fontWeight:700}}>{x[0]}</div>
                      <div style={{fontSize:15,fontWeight:900,color:x[2]}}>{x[1]}</div>
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {calidades.map(function(cal){
                  var dc=totales.detCal[cal.id]||{kg:0,pct:0};
                  return(
                    <div key={cal.id} style={{background:"rgba(0,0,0,0.2)",borderRadius:8,padding:"5px 11px"}}>
                      <div style={{fontSize:9,color:cal.c,fontWeight:700}}>{cal.l}</div>
                      <div style={{fontSize:14,fontWeight:900}}>{dc.kg} kg</div>
                      <div style={{fontSize:10,color:cal.c,fontWeight:600}}>{dc.pct}%</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ═══════════════ TAB EVOLUCION ═══════════════ */}
      {tab==="evolucion"&&(
        <div style={{padding:"12px 12px 40px"}}>
          <div style={{fontSize:10,color:"#4a6a3a",fontWeight:700,letterSpacing:2,
                       textTransform:"uppercase",marginBottom:12}}>
            Evolucion — {cultivo} — ultimos {diasHist.length} dias
          </div>

          {diasHist.length===0&&(
            <div style={{textAlign:"center",padding:"48px 0",color:"#2a3a2a",fontSize:13}}>
              Sin historial guardado. Guarda los rendimientos del dia desde la pestana Captura.
            </div>
          )}

          {diasHist.length>0&&(
            <div>
              <Barras titulo="% Merma por dia"
                datos={diasHist.slice().reverse().map(function(d){
                  var p=d.tot?d.tot.pctMerma:0;
                  return{label:d.fecha.slice(5),valor:p,sufijo:"%",
                         color:p>20?"#ef4444":p>12?"#f59e0b":"#4ade80"};
                })}/>
              <Barras titulo="Factor de rendimiento % (kg empacados / kg recibidos)"
                datos={diasHist.slice().reverse().map(function(d){
                  var p=d.tot?d.tot.factorRend:0;
                  return{label:d.fecha.slice(5),valor:p,sufijo:"%",
                         color:p>90?"#4ade80":p>80?"#a8e063":"#f59e0b"};
                })}/>
              {calidades.length>0&&(
                <Barras titulo={"Indice 1a calidad % — "+calidades[0].l}
                  datos={diasHist.slice().reverse().map(function(d){
                    var dc=d.tot&&d.tot.detCal&&d.tot.detCal[calidades[0].id];
                    var p=dc?dc.pct:0;
                    return{label:d.fecha.slice(5),valor:p,sufijo:"%",
                           color:p>70?"#22c55e":p>55?"#4ade80":"#f59e0b"};
                  })}/>
              )}

              {/* Tabla historico */}
              <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",
                           borderRadius:10,overflow:"hidden"}}>
                <div style={{fontSize:10,color:"#4a6a3a",fontWeight:700,letterSpacing:1.5,
                             textTransform:"uppercase",padding:"10px 13px",
                             borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
                  Resumen historico
                </div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr>
                        <th style={S.th}>Fecha</th>
                        <th style={S.th}>Kg Rec.</th>
                        <th style={S.th}>Kg Emp.</th>
                        {calidades.map(function(c){
                          return <th key={c.id} style={Object.assign({},S.th,{color:c.c})}>{c.l.split(" ")[0]}</th>;
                        })}
                        <th style={Object.assign({},S.th,{color:"#ef4444"})}>Merma%</th>
                        <th style={S.th}>Factor%</th>
                      </tr>
                    </thead>
                    <tbody>
                      {diasHist.map(function(d,i){
                        if(!d.tot)return null;
                        var t=d.tot;
                        return(
                          <tr key={i} style={{borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                            <td style={Object.assign({},S.td,{fontWeight:700,color:"#9ca3af"})}>{d.fecha}</td>
                            <td style={Object.assign({},S.td,{fontFamily:"'DM Mono',monospace"})}>{t.kgRec}</td>
                            <td style={Object.assign({},S.td,{fontFamily:"'DM Mono',monospace",color:"#4ade80"})}>{t.kgEmp}</td>
                            {calidades.map(function(cal){
                              var dc=(t.detCal&&t.detCal[cal.id])||{pct:0};
                              return <td key={cal.id} style={Object.assign({},S.td,{color:cal.c,fontWeight:700})}>{dc.pct}%</td>;
                            })}
                            <td style={Object.assign({},S.td,{fontWeight:700,
                              color:t.pctMerma>20?"#ef4444":t.pctMerma>12?"#f59e0b":"#4ade80"})}>
                              {t.pctMerma}%
                            </td>
                            <td style={Object.assign({},S.td,{fontWeight:700,
                              color:t.factorRend>90?"#4ade80":"#f59e0b"})}>
                              {t.factorRend}%
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
