<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Control General de Empaque - Parras Valley</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
/* Scrollbar grueso y visible */
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:#0F2818;}
::-webkit-scrollbar-thumb{background:#3A8A50;border-radius:6px;border:2px solid #0F2818;}
::-webkit-scrollbar-thumb:hover{background:#A8E063;}
* {scrollbar-width:thick;scrollbar-color:#2A6A3A #0F2818;}

html,body,#root{background:#0F2818;min-height:100%;}
body{color:#FFFFFF;font-family:system-ui,-apple-system,sans-serif;font-size:17px;line-height:1.6;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
select option{background:#0F2818;}

/* INPUTS */
.inp{width:100%;background:#122010;border:2px solid #2A5A35;border-radius:10px;padding:12px 14px;color:#FFFFFF;font-family:system-ui;font-size:16px;font-weight:800;outline:none;transition:border-color .15s;}
.inp:focus{border-color:#B8F070;box-shadow:0 0 0 3px rgba(168,224,99,.15);}
.inp::placeholder{color:#6AAA80;font-weight:600;}

/* LABELS */
.lbl{font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#8DD4A0;margin-bottom:5px;display:block;}

/* BOTONES */
.btn{padding:12px 18px;border:2px solid;border-radius:10px;font-family:system-ui;font-size:13px;font-weight:900;cursor:pointer;letter-spacing:.5px;background:transparent;min-height:46px;transition:all .15s;}
.btn:active{transform:scale(.97);}
.btn-pri{border-color:#B8F070;color:#B8F070;}
.btn-pri:hover{background:rgba(168,224,99,.12);}
.btn-amb{border-color:#F5C518;color:#F5C518;}
.btn-amb:hover{background:rgba(245,197,24,.1);}
.btn-blue{border-color:#60C8FA;color:#60C8FA;}
.btn-blue:hover{background:rgba(96,200,250,.1);}
.btn-gray{border-color:#3A7A48;color:#8DD4A0;}
.btn-gray:hover{background:rgba(90,154,106,.1);}
.btn-save{background:linear-gradient(135deg,#2A8A42,#C0F070);border:none;color:#051205;font-size:16px;font-weight:900;padding:14px 24px;border-radius:12px;cursor:pointer;font-family:system-ui;letter-spacing:.5px;min-height:52px;box-shadow:0 4px 20px rgba(168,224,99,.25);}
.btn-save:hover{box-shadow:0 6px 28px rgba(168,224,99,.4);}

/* CARDS */
.card{background:#1A3824;border:1.5px solid #1E4A28;border-radius:14px;padding:16px;}
.card-recibo{border-color:#3A7A48;}
.card-pri{border-left:4px solid #A8E063;}
.card-seg{border-left:4px solid #60C8FA;}
.card-ter{border-left:4px solid #F5C518;}
.card-sup{border-left:4px solid #A8E063;}
.card-sel{border-left:4px solid #60C8FA;}
.card-cho{border-left:4px solid #F5C518;}
.card-ver{border-left:4px solid #C97AE8;}
.card-merma{background:#200A08;border-color:#CF4A38;}

/* NUMERO GRANDE */
.num-big{font-size:28px;font-weight:900;font-family:Georgia,serif;line-height:1.1;}
.num-med{font-size:22px;font-weight:900;font-family:Georgia,serif;line-height:1.1;}
.num-sm{font-size:16px;font-weight:900;font-family:Georgia,serif;}

/* BARRA PROGRESO */
.bar-wrap{background:#0F2818;border-radius:6px;height:10px;overflow:hidden;margin-top:4px;}
.bar-fill{height:100%;border-radius:6px;transition:width .4s;}

/* TAGS */
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:900;letter-spacing:1px;}

/* HEADER */
.hdr{background:#122010;border-bottom:2px solid #1E4A28;position:sticky;top:0;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.4);}

/* CULTIVO TABS */
.cult-tab{flex-shrink:0;padding:8px 16px;border-radius:10px;border:2px solid #1E4A28;background:transparent;color:#6AAA80;font-family:system-ui;font-size:13px;font-weight:900;cursor:pointer;transition:all .15s;white-space:nowrap;min-height:40px;}
.cult-tab.on{border-color:var(--tc);color:var(--tc);background:rgba(255,255,255,.05);}

/* RANCHO TABS */
.ran-tab{flex-shrink:0;padding:7px 14px;border-radius:8px;border:1.5px solid #1A3A22;background:transparent;color:#6AAA80;font-family:system-ui;font-size:13px;font-weight:900;cursor:pointer;min-height:38px;transition:all .15s;}
.ran-tab.on{border-color:var(--tc);color:var(--tc);background:rgba(255,255,255,.05);}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;vertical-align:middle;margin-left:5px;}

@media(min-width:700px){.rancho-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}}
@media(min-width:900px){.rancho-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState;
var useEffect=React.useEffect;
var FB="https://parrasvalley-default-rtdb.firebaseio.com";
var FB_PROD=FB+"/produccion-v1.json";
var FB_RECIBO=FB+"/recibo-hist-v1.json";
var PIN_EDITOR="1986";

function fbGet(k){return fetch(FB+"/"+k+".json").then(function(r){return r.json();}).catch(function(){return null;});}
function fbSet(k,v){return fetch(FB+"/"+k+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}).catch(function(){});}
function r2(n){return Math.round(n*100)/100;}
function nv(v){var x=parseFloat(v);return isNaN(x)?0:x;}
function ni(v){var x=parseInt(v);return isNaN(x)?0:x;}
function pct(a,b){return b>0?r2(a/b*100):0;}
function fechaHoy(){var d=new Date();var dd=d.getDate();var mm=d.getMonth()+1;return d.getFullYear()+"-"+(mm<10?"0":"")+mm+"-"+(dd<10?"0":"")+dd;}

// ===== CONFIGURACION =====
var CULTIVOS=[
  {id:"persa",  label:"Persa",   color:"#22c55e"},
  {id:"slicer", label:"Slicer",  color:"#3b82f6"},
  {id:"europeo",label:"Europeo", color:"#a78bfa"},
  {id:"morron", label:"Morron",  color:"#f59e0b"},
  {id:"minibel",label:"Minibel", color:"#f43f5e"}
];

var CFG={
  persa:{
    ranchos:["PVT","Cordillera","Forrajera"],
    piezas:false,colores:null,
    calidades:[{id:"pri",label:"Primera"},{id:"seg",label:"Segunda"},{id:"ter",label:"Tercera"}],
    presentaciones:{
      pri:[{id:"20lb",label:"20 lb",kg:9.25},{id:"8x2",label:"8x2",kg:7.6},{id:"12x1",label:"12x1",kg:5.7}],
      seg:[{id:"20lb",label:"20 lb",kg:9.25},{id:"8x2",label:"8x2",kg:7.6},{id:"12x1",label:"12x1",kg:5.7}],
      ter:[{id:"20lb",label:"20 lb",kg:9.25}]
    },
    calMap:{"Primera":"pri","Segunda":"seg","Tercera":"ter"},
    presMap:{"20lb":"20lb","8x2":"8x2","12x1":"12x1"}
  },
  slicer:{
    ranchos:["Forrajera","Cordillera"],
    piezas:true,colores:null,
    calidades:[{id:"sup",label:"Superselecto"},{id:"sel",label:"Selecto"},{id:"cho",label:"Choice / Plain"}],
    presentaciones:{
      sup:[{id:"62ct",label:"62ct",pzCaja:62,tipo:"ct"},{id:"18ct",label:"18ct",pzCaja:18,tipo:"ct"},{id:"24ct",label:"24ct",pzCaja:24,tipo:"ct"},{id:"36ct",label:"36ct",pzCaja:36,tipo:"ct"},{id:"25lb",label:"25 lb",kg:11.57,tipo:"kg"},{id:"50lb",label:"50 lb",kg:23.13,tipo:"kg"}],
      sel:[{id:"18ct",label:"18ct",pzCaja:18,tipo:"ct"},{id:"24ct",label:"24ct",pzCaja:24,tipo:"ct"},{id:"36ct",label:"36ct",pzCaja:36,tipo:"ct"},{id:"25lb",label:"25 lb",kg:11.57,tipo:"kg"},{id:"50lb",label:"50 lb",kg:23.13,tipo:"kg"}],
      cho:[{id:"50lb",label:"50 lb",kg:23.13,tipo:"kg"}]
    },
    calMap:{"Superselecto":"sup","Primera":"sup","Selecto":"sel","Segunda":"sel","Choice":"cho","Plain":"cho","Tercera":"cho"},
    presMap:{"62ct":"62ct","18ct":"18ct","24ct":"24ct","36ct":"36ct","25lb":"25lb","50lb":"50lb"}
  },
  europeo:{
    ranchos:["Cordillera"],
    piezas:true,colores:null,
    calidades:[{id:"pri",label:"Primera"},{id:"seg",label:"Segunda"},{id:"ter",label:"Tercera (Choice)"}],
    presentaciones:{
      pri:[{id:"24ct",label:"24ct",pzCaja:24,tipo:"ct"},{id:"12ct",label:"12ct",pzCaja:12,tipo:"ct"}],
      seg:[{id:"24ct",label:"24ct",pzCaja:24,tipo:"ct"},{id:"12ct",label:"12ct",pzCaja:12,tipo:"ct"}],
      ter:[{id:"11b",label:"Caja 11B (48pz)",pzCaja:48,tipo:"ct"}]
    },
    calMap:{"Primera":"pri","Segunda":"seg","Tercera":"ter","Choice":"ter"},
    presMap:{"24ct":"24ct","12ct":"12ct","11B":"11b","11b":"11b"}
  },
  morron:{
    ranchos:["Forrajera","Cordillera","Fepo"],
    piezas:false,
    colores:["Rojo","Amarillo","Naranja","Verde"],
    calidades:[{id:"pri",label:"Primera"},{id:"ter",label:"Tercera (Choice)"}],
    presentaciones:{
      pri:[{id:"L",label:"L (5.13kg)",kg:5.13,tipo:"kg"},{id:"XL",label:"XL (5.13kg)",kg:5.13,tipo:"kg"},{id:"Jumbo",label:"Jumbo (5.13kg)",kg:5.13,tipo:"kg"},{id:"verde25",label:"Verde/Madurar (25lb)",kg:11.34,tipo:"kg"}],
      ter:[{id:"smallmed",label:"Small+Mediano (25lb)",kg:11.34,tipo:"kg"},{id:"choice",label:"Choice (25lb)",kg:11.34,tipo:"kg"}]
    },
    calMap:{"Primera":"pri","Segunda":"pri","Tercera":"ter","Choice":"ter"},
    presMap:{"L":"L","XL":"XL","Jumbo":"Jumbo","Verde":"verde25"}
  },
  minibel:{
    ranchos:["Cordillera","Forrajera"],
    piezas:false,colores:null,
    calidades:[{id:"pri",label:"Primera"},{id:"seg",label:"Segunda"}],
    presentaciones:{
      pri:[{id:"12x8oz",label:"12x8oz (2.88kg)",kg:2.88,tipo:"kg"},{id:"12x1lb",label:"12x1lb (5.7kg)",kg:5.7,tipo:"kg"},{id:"18lb",label:"18lb (8.16kg)",kg:8.16,tipo:"kg"},{id:"rpc30",label:"Verde RPC 30lb",kg:13.61,tipo:"kg"}],
      seg:[{id:"18lb",label:"18lb (8.16kg)",kg:8.16,tipo:"kg"}]
    },
    calMap:{"Primera":"pri","Segunda":"seg"},
    presMap:{"12x8oz":"12x8oz","12x1lb":"12x1lb","18lb":"18lb"}
  }
};

function initForm(){return{malla:"",rejas:"",pesoReja:"",piezasReja:"",color:""};}

function calcular(cultivo,form){
  var cfg=CFG[cultivo];
  var rejas=nv(form.rejas);var pesoReja=nv(form.pesoReja);
  var kgRec=r2(rejas*pesoReja);
  var pzRec=cfg.piezas?Math.round(rejas*nv(form.piezasReja)):0;
  // Peso promedio por pieza (solo aplica para Slicer y Europeo)
  var pesoPieza=pzRec>0?kgRec/pzRec:0;
  var kgEmp=0;var pzEmp=0;var det={};
  cfg.calidades.forEach(function(cal){
    var pres=cfg.presentaciones[cal.id]||[];
    var kgC=0;var pzC=0;
    pres.forEach(function(p){
      var cajas=ni(form["c_"+cal.id+"_"+p.id]||0);
      if(p.tipo==="kg"){
        kgC+=cajas*(p.kg||0);
      } else {
        // Conteo: convertir a kg usando peso promedio por pieza
        var pzXC=ni(form["pz_"+cal.id+"_"+p.id]||p.pzCaja||0);
        var pzTotal=cajas*pzXC;
        pzC+=pzTotal;
        kgC+=r2(pzTotal*pesoPieza);
      }
    });
    kgEmp+=kgC;pzEmp+=pzC;
    det[cal.id]={kg:r2(kgC),pz:pzC,pct:pct(kgC,kgRec)};
  });
  var kgMerma=r2(kgRec-kgEmp);
  return{
    kgRec:kgRec,pzRec:pzRec,pesoPieza:r2(pesoPieza*1000)/1000,
    kgEmp:r2(kgEmp),pzEmp:pzEmp,
    kgMerma:kgMerma,pctMerma:pct(kgMerma,kgRec),
    det:det
  };
}

// ===== FORMULARIO DE UN RANCHO =====
function FormRancho(props){
  var cultivo=props.cultivo;var col=props.col;
  var form=props.form;var setForm=props.setForm;
  var calc=props.calc;var auth=props.auth;
  var cfg=CFG[cultivo];
  function sf(k,v){var n=Object.assign({},form);n[k]=v;setForm(n);}
  var calColors={pri:"#22c55e",sup:"#22c55e",seg:"#60a5fa",sel:"#60a5fa",ter:"#f59e0b",cho:"#f59e0b",ver:"#a78bfa"};
  return(
    <div>
      {/* Recibo */}
      <div className="card card-recibo" style={{marginBottom:10}}>
        <div className="lbl" style={{color:"#B8F070",fontSize:11,marginBottom:10}}>Datos de Recibo de Campo</div>
        <div style={{display:"grid",gridTemplateColumns:cfg.piezas?"1fr 1fr 1fr":"1fr 1fr",gap:6,marginBottom:6}}>
          <div><div className="lbl">Malla</div><input className="inp" style={{"--ac":col}} type="text" placeholder="Ej: 5" value={form.malla||""} onChange={function(e){sf("malla",e.target.value);}} disabled={!auth}/></div>
          <div><div className="lbl">Rejas</div><input className="inp" style={{"--ac":col}} type="number" min="0" placeholder="0" value={form.rejas||""} onChange={function(e){sf("rejas",e.target.value);}} disabled={!auth}/></div>
          <div><div className="lbl">Kg/reja</div><input className="inp" style={{"--ac":col}} type="number" step="0.01" min="0" placeholder="0.00" value={form.pesoReja||""} onChange={function(e){sf("pesoReja",e.target.value);}} disabled={!auth}/></div>
          {cfg.piezas&&<div><div className="lbl">Pz/reja</div><input className="inp" style={{"--ac":col}} type="number" min="0" placeholder="0" value={form.piezasReja||""} onChange={function(e){sf("piezasReja",e.target.value);}} disabled={!auth}/></div>}
        </div>
        {cfg.colores&&(
          <div>
            <div className="lbl">Color</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>
              {cfg.colores.map(function(c2){
                var cm={Rojo:"#f87171",Amarillo:"#fbbf24",Naranja:"#fb923c",Verde:"#4ade80"};
                var cc2=cm[c2]||col;
                return(
                  <button key={c2} onClick={function(){sf("color",c2);}}
                    style={{padding:"4px 10px",borderRadius:6,border:"2px solid "+(form.color===c2?cc2:"rgba(255,255,255,0.1)"),background:"transparent",color:form.color===c2?cc2:"#666",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"system-ui"}}>
                    {c2}
                  </button>
                );
              })}
            </div>
          </div>
        )}
        {calc.kgRec>0&&(
          <div style={{display:"flex",gap:12,marginTop:6,flexWrap:"wrap"}}>
            <div><div className="lbl">Kg recibidos</div><div className="num-big" style={{color:col}}>{calc.kgRec} <span style={{fontSize:13,fontWeight:700}}>kg</span></div></div>
            {cfg.piezas&&calc.pzRec>0&&<div><div className="lbl">Piezas</div><div className="num-big" style={{color:col}}>{calc.pzRec} <span style={{fontSize:13,fontWeight:700}}>pz</span></div></div>}
            {cfg.piezas&&calc.pesoPieza>0&&<div><div className="lbl">Kg/pieza</div><div className="num-med" style={{color:"#F5C518"}}>{calc.pesoPieza} <span style={{fontSize:12,fontWeight:700}}>kg/pz</span></div></div>}
          </div>
        )}
      </div>
      {/* Empaque por calidad */}
      {cfg.calidades.map(function(cal){
        var pres=cfg.presentaciones[cal.id]||[];
        var cc=calColors[cal.id]||col;
        var d=calc.det[cal.id]||{};
        return(
          <div key={cal.id} className={"card card-"+cal.id} style={{marginBottom:8}}>
            <div className="lbl" style={{color:cc,fontSize:11,marginBottom:8}}>{cal.label}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
              {pres.map(function(p){
                var fk="c_"+cal.id+"_"+p.id;
                return(
                  <div key={p.id}>
                    <div className="lbl">{p.label}</div>
                    <input className="inp" style={{"--ac":cc}} type="number" min="0" placeholder="cajas" value={form[fk]||""} onChange={function(e){sf(fk,e.target.value);}} disabled={!auth}/>
                    {p.tipo==="ct"&&p.pzCaja===null&&(
                      <input className="inp" style={{"--ac":cc,marginTop:3,fontSize:11,padding:"5px 8px"}} type="number" min="0" placeholder="pz/caja" value={form["pz_"+cal.id+"_"+p.id]||""} onChange={function(e){sf("pz_"+cal.id+"_"+p.id,e.target.value);}} disabled={!auth}/>
                    )}
                  </div>
                );
              })}
            </div>
            {(d.kg>0||d.pz>0)&&<div style={{marginTop:5,fontSize:11,color:cc,fontWeight:700}}>{d.kg>0?d.kg+" kg":""}{d.pz>0?"  .  "+d.pz+" pz":""}</div>}
          </div>
        );
      })}
      {/* Resumen porcentajes */}
      {calc.kgRec>0&&calc.kgEmp>0&&(
        <div className="card" style={{marginBottom:6,borderColor:"rgba(255,255,255,0.1)"}}>
          <div style={{fontSize:10,fontWeight:900,color:"#8899aa",letterSpacing:2,marginBottom:8}}>RENDIMIENTO</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(70px,1fr))",gap:6}}>
            {cfg.calidades.map(function(cal){
              var d=calc.det[cal.id]||{};
              if(!d.kg)return null;
              var calColors={pri:"#22c55e",sup:"#22c55e",seg:"#60a5fa",sel:"#60a5fa",ter:"#f59e0b",cho:"#f59e0b",ver:"#a78bfa"};
              var cc=calColors[cal.id]||col;
              return(
                <div key={cal.id} style={{textAlign:"center",background:"rgba(0,0,0,0.2)",borderRadius:7,padding:"6px"}}>
                  <div style={{fontSize:9,color:cc,fontWeight:900,letterSpacing:1}}>{cal.label.substring(0,8).toUpperCase()}</div>
                  <div className="num-med" style={{color:cc,marginBottom:4}}>{d.pct}<span style={{fontSize:12}}>%</span></div><div className="bar-wrap"><div className="bar-fill" style={{width:d.pct+"%",background:cc}}/></div>
                  <div style={{fontSize:9,color:"#4a6a7a"}}>{d.kg} kg</div>
                </div>
              );
            })}
            <div style={{textAlign:"center",background:"rgba(239,68,68,0.06)",borderRadius:7,padding:"6px"}}>
              <div style={{fontSize:9,color:"#f87171",fontWeight:900,letterSpacing:1}}>MERMA</div>
              <div style={{fontSize:20,fontWeight:900,color:"#f87171",fontFamily:"Georgia,serif"}}>{calc.pctMerma}%</div>
              <div style={{fontSize:9,color:"#4a6a7a"}}>{calc.kgMerma} kg</div>
            </div>
          </div>
        </div>
      )}
      {/* Merma detalle */}
      {calc.kgRec>0&&(
        <div className="card card-merma">
          <div className="lbl" style={{color:"#FF7B72",fontSize:11,marginBottom:8}}>Merma</div>
          <div style={{display:"flex",gap:16}}>
            <div><div className="lbl">Kg merma</div><div className="num-big" style={{color:"#FF7B72"}}>{calc.kgMerma} <span style={{fontSize:13,fontWeight:700}}>kg</span></div></div>
            <div><div className="lbl">% merma</div><div className="num-big" style={{color:calc.pctMerma>15?"#FF7B72":"#F5C518"}}>{calc.pctMerma}<span style={{fontSize:13,fontWeight:700}}>%</span></div></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ===== APP PRINCIPAL =====
function App(){
  var s1=useState("persa");var cultivo=s1[0];var setCultivo=s1[1];
  var s2=useState(null);var ranchoMob=s2[0];var setRanchoMob=s2[1];
  var s3=useState(false);var auth=s3[0];var setAuth=s3[1];
  var s4=useState(false);var showPin=s4[0];var setShowPin=s4[1];
  var s5=useState("");var pinVal=s5[0];var setPinVal=s5[1];
  var s6=useState(false);var pinErr=s6[0];var setPinErr=s6[1];
  var s7=useState({});var forms=s7[0];var setForms=s7[1];
  var s8=useState({});var hists=s8[0];var setHists=s8[1];
  var s9=useState(false);var guardando=s9[0];var setGuardando=s9[1];
  var s10=useState(null);var msg=s10[0];var setMsg=s10[1];
  var s11=useState("form");var vista=s11[0];var setVista=s11[1];
  var s12=useState(false);var jalando=s12[0];var setJalando=s12[1];
  var s13=useState(fechaHoy());var fechaJalar=s13[0];var setFechaJalar=s13[1];
  var s14=useState(false);var showJalar=s14[0];var setShowJalar=s14[1];

  var cfg=CFG[cultivo];
  var colObj=CULTIVOS.find(function(c){return c.id===cultivo;})||CULTIVOS[0];
  var cc=colObj.color;

  // Inicializar rancho movil al primero del cultivo
  useEffect(function(){setRanchoMob(cfg.ranchos[0]);},[ cultivo]);

  // Cargar historial
  useEffect(function(){
    CULTIVOS.forEach(function(c){
      fbGet("rendgral-hist-"+c.id+"-v1").then(function(d){
        if(d&&typeof d==="object"){
          var arr=Array.isArray(d)?d:Object.keys(d).map(function(k){return d[k];});
          arr.sort(function(a,b){return(b.id||0)-(a.id||0);});
          setHists(function(h){var n=Object.assign({},h);n[c.id]=arr;return n;});
        }
      });
    });
  },[]);

  function getForm(rancho){
    return(forms[cultivo]&&forms[cultivo][rancho])||initForm();
  }
  function setForm(rancho,v){
    setForms(function(f){var n=Object.assign({},f);if(!n[cultivo])n[cultivo]={};n[cultivo]=Object.assign({},n[cultivo]);n[cultivo][rancho]=v;return n;});
  }

  // ===== JALAR DE RECIBO =====
  function jalarRecibo(){
    setJalando(true);
    fetch(FB_RECIBO).then(function(r){return r.json();}).then(function(data){
      var arr=Array.isArray(data)?data:(data&&typeof data==="object"?Object.keys(data).map(function(k){return data[k];}): []);
      // Mapear linea a cultivo
      var lineaMap={persa:"Persa",slicer:"Slicer",europeo:"Europeo",morron:"Morron",minibel:"Minibel"};
      var nombreLinea=lineaMap[cultivo];
      // Acumular rejas por rancho para la fecha seleccionada
      var rejasPorRancho={};
      arr.forEach(function(h){
        if(!h||(h.lineaNombre||"").toLowerCase()!==nombreLinea.toLowerCase())return;
        (h.lotes||[]).forEach(function(lote){
          if(!lote.ts)return;
          var d=new Date(lote.ts);var m=d.getMonth()+1;var dd=d.getDate();
          var iso=d.getFullYear()+"-"+(m<10?"0":"")+m+"-"+(dd<10?"0":"")+dd;
          if(iso!==fechaJalar)return;
          var r=lote.rancho||"";
          if(!rejasPorRancho[r])rejasPorRancho[r]={rejas:0,malla:""};
          rejasPorRancho[r].rejas+=(parseInt(lote.cajas)||0);
          if(lote.malla)rejasPorRancho[r].malla=lote.malla;
        });
      });
      // Aplicar a los forms de cada rancho
      cfg.ranchos.forEach(function(rancho){
        var datos=rejasPorRancho[rancho];
        if(!datos)return;
        setForm(rancho,Object.assign({},getForm(rancho),{rejas:String(datos.rejas),malla:datos.malla||""}));
      });
      setJalando(false);setShowJalar(false);
      var n=Object.keys(rejasPorRancho).length;
      setMsg(n>0?"Recibo jalado: "+n+" rancho(s)":"Sin datos de recibo para esa fecha");
      setTimeout(function(){setMsg(null);},4000);
    }).catch(function(){setJalando(false);setMsg("Error al conectar con recibo");setTimeout(function(){setMsg(null);},3000);});
  }

  // ===== JALAR DE PRODUCCION =====
  function jalarProduccion(){
    setJalando(true);
    fetch(FB_PROD).then(function(r){return r.json();}).then(function(data){
      if(!data){setJalando(false);return;}
      // Buscar el producto correspondiente
      var prodNombre=cultivo.charAt(0).toUpperCase()+cultivo.slice(1);
      var prodData=data[prodNombre]||data[prodNombre.toLowerCase()]||{};
      var todos=(prodData.inventario||[]).concat(prodData.bajados||[]).concat(prodData.registros||[]);
      // Filtrar por fecha
      var filtrados=todos.filter(function(r){return(r.fecha||r.fechaInventario||"")===fechaJalar;});
      // Agrupar por rancho luego por calidad+presentacion
      var acum={};
      filtrados.forEach(function(r){
        var ran=r.rancho||"";
        if(!acum[ran])acum[ran]={};
        var calId=cfg.calMap&&cfg.calMap[r.calidad]||null;
        var presId=cfg.presMap&&cfg.presMap[r.presentacion]||null;
        if(!calId||!presId)return;
        var fk="c_"+calId+"_"+presId;
        acum[ran][fk]=(ni(acum[ran][fk]||0))+(parseInt(r.cajas)||0);
      });
      // Aplicar a forms
      cfg.ranchos.forEach(function(rancho){
        var datos=acum[rancho];
        if(!datos||!Object.keys(datos).length)return;
        var base=Object.assign({},getForm(rancho));
        Object.keys(datos).forEach(function(k){base[k]=String(datos[k]);});
        setForm(rancho,base);
      });
      setJalando(false);setShowJalar(false);
      var n=Object.keys(acum).length;
      setMsg(n>0?"Produccion jalada: "+n+" rancho(s)":"Sin produccion para esa fecha");
      setTimeout(function(){setMsg(null);},4000);
    }).catch(function(){setJalando(false);setMsg("Error al conectar con produccion");setTimeout(function(){setMsg(null);},3000);});
  }

  // ===== GUARDAR =====
  function guardarTodo(){
    if(!auth){setShowPin(true);return;}
    setGuardando(true);
    var entrada={id:Date.now(),fecha:fechaJalar,cultivo:cultivo,ranchos:{}};
    cfg.ranchos.forEach(function(rancho){
      var form=getForm(rancho);
      if(!nv(form.rejas)&&!nv(form.pesoReja))return;
      entrada.ranchos[rancho]={form:Object.assign({},form),calc:calcular(cultivo,form)};
    });
    if(!Object.keys(entrada.ranchos).length){
      setMsg("Sin datos para guardar");setGuardando(false);
      setTimeout(function(){setMsg(null);},3000);return;
    }
    var hist=[entrada].concat(hists[cultivo]||[]);
    fbSet("rendgral-hist-"+cultivo+"-v1",hist).then(function(){
      setHists(function(h){var n=Object.assign({},h);n[cultivo]=hist;return n;});
      setGuardando(false);
      setMsg("Guardado");setTimeout(function(){setMsg(null);},3000);
    });
  }

  // ===== RENDER HISTORIAL =====
  function renderHist(){
    var hist=hists[cultivo]||[];
    if(!hist.length)return <div style={{textAlign:"center",padding:30,color:"#4a6a7a",fontSize:13}}>Sin registros</div>;
    return hist.map(function(h){
      var ranchos=h.ranchos||{};
      var keys=Object.keys(ranchos);
      return(
        <div key={h.id} className="card" style={{marginBottom:12,borderLeft:"4px solid "+cc}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:16,fontWeight:900,color:cc}}>{h.fecha}</div>
            <div style={{fontSize:10,color:"#4a6a7a"}}>{keys.length} rancho(s)</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:6}}>
            {keys.map(function(r){
              var d=ranchos[r];var c2=d.calc||{};
              return(
                <div key={r} style={{background:"rgba(0,0,0,0.2)",borderRadius:7,padding:"8px 10px",borderLeft:"3px solid "+cc}}>
                  <div style={{fontSize:11,fontWeight:900,color:cc,marginBottom:3}}>{r}</div>
                  <div style={{fontSize:10,color:"#8899aa"}}>Rec: <span style={{color:cc,fontWeight:700}}>{c2.kgRec||0} kg</span></div>
                  <div style={{fontSize:10,color:"#8899aa"}}>Merma: <span style={{color:"#f87171",fontWeight:700}}>{c2.pctMerma||0}%</span></div>
                </div>
              );
            })}
          </div>
        </div>
      );
    });
  }

  // ===== RENDER PRINCIPAL =====
  var isMobile=typeof window!=="undefined"&&window.innerWidth<700;

  return(
    <div style={{background:"#0F2818",minHeight:"100vh"}}>
      {/* HEADER */}
      <div className="hdr" style={{padding:"12px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div>
            <div style={{fontSize:18,fontWeight:900,color:"#FFFFFF",letterSpacing:.5}}>Control General de Empaque</div>
            <div style={{fontSize:10,color:"#8DD4A0",letterSpacing:3,fontWeight:700}}>PARRAS VALLEY TOMATOES</div>
          </div>
          <div style={{display:"flex",gap:5}}>
            <button onClick={function(){setVista(vista==="form"?"hist":"form");}} className="btn btn-gray">{vista==="form"?"Historial":"Captura"}</button>
            <button onClick={function(){if(auth){setAuth(false);}else{setShowPin(true);}}} className={"btn "+(auth?"btn-pri":"btn-gray")}>{auth?"Editor":"Lector"}</button>
          </div>
        </div>
        {/* Tabs cultivo */}
        <div style={{display:"flex",gap:4,overflowX:"auto",scrollbarWidth:"none",marginBottom:vista==="form"?8:0}}>
          {CULTIVOS.map(function(c){
            var n=(hists[c.id]||[]).length;
            return(
              <button key={c.id} onClick={function(){setCultivo(c.id);}}
                className={"cult-tab"+(cultivo===c.id?" on":"")} style={{"--tc":c.color}}>
                {c.label}{n>0&&<span style={{fontSize:9,marginLeft:3,opacity:.6}}>({n})</span>}
              </button>
            );
          })}
        </div>
        {/* Sub-tabs rancho - solo en movil y form */}
        {vista==="form"&&(
          <div style={{display:"flex",gap:4,overflowX:"auto",scrollbarWidth:"none"}}>
            {cfg.ranchos.map(function(r){
              var form=getForm(r);var hasData=nv(form.rejas)>0;
              return(
                <button key={r} onClick={function(){setRanchoMob(r);}}
                  className={"ran-tab"+(ranchoMob===r?" on":"")} style={{"--tc":cc,display:"flex",alignItems:"center"}}>
                  {r}
                  {hasData&&<span className="dot" style={{background:cc}}/>}
                </button>
              );
            })}
          </div>
        )}
      </div>

      {/* CONTENIDO */}
      <div style={{maxWidth:1200,margin:"0 auto",padding:"14px 14px 90px"}}>
        {msg&&<div style={{background:"rgba(168,224,99,0.1)",border:"2px solid rgba(168,224,99,0.4)",borderRadius:10,padding:"10px 14px",marginBottom:10,fontSize:14,color:"#B8F070",fontWeight:900}}>{msg}</div>}

        {/* Botones de jalar */}
        {vista==="form"&&auth&&(
          <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            <button onClick={function(){setShowJalar("recibo");}} className="btn btn-amb">{jalando?"Jalando...":"Jalar de recibo"}</button>
            <button onClick={function(){setShowJalar("prod");}} className="btn btn-blue">{jalando?"Jalando...":"Jalar de produccion"}</button>
            <input type="date" value={fechaJalar} onChange={function(e){setFechaJalar(e.target.value);}}
              style={{background:"rgba(0,0,0,0.4)",border:"1.5px solid rgba(255,255,255,0.12)",borderRadius:7,padding:"6px 10px",color:"#e8f0e0",fontFamily:"system-ui",fontSize:11,outline:"none"}}/>
          </div>
        )}

        {vista==="form"&&(
          <div>
            {/* MOVIL: un rancho a la vez */}
            <div style={{display:"block"}}>
              {cfg.ranchos.map(function(r){
                if(r!==ranchoMob)return null;
                var form=getForm(r);var calc=calcular(cultivo,form);
                return(
                  <div key={r}>
                    <div style={{fontSize:12,fontWeight:900,color:cc,marginBottom:8,borderBottom:"1px solid "+cc+"33",paddingBottom:6}}>{colObj.label} - {r}</div>
                    <FormRancho cultivo={cultivo} col={cc} form={form} setForm={function(v){setForm(r,v);}} calc={calc} auth={auth}/>
                  </div>
                );
              })}
            </div>
            {/* Guardar */}
            {auth&&(
              <button onClick={guardarTodo} disabled={guardando} className="btn-save" style={{width:"100%",marginTop:12}}>
                {guardando?"Guardando...":"Guardar todos los ranchos"}
              </button>
            )}
          </div>
        )}

        {vista==="hist"&&renderHist()}
      </div>

      {/* FAB guardar */}
      {vista==="form"&&auth&&(
        <button onClick={guardarTodo} disabled={guardando}
          className="btn-save" style={{position:"fixed",bottom:20,right:16,zIndex:100,borderRadius:24,boxShadow:"0 6px 24px rgba(0,0,0,.5)"}}>
          {guardando?"...":"Guardar"}
        </button>
      )}

      {/* MODAL JALAR */}
      {showJalar&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.9)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#080f14",border:"2px solid "+(showJalar==="recibo"?"rgba(251,191,36,0.4)":"rgba(96,165,250,0.4)"),borderRadius:14,padding:"22px",maxWidth:320,width:"100%"}}>
            <div style={{fontSize:14,fontWeight:900,color:showJalar==="recibo"?"#fbbf24":"#60a5fa",marginBottom:4}}>{showJalar==="recibo"?"Jalar de recibo de fruta":"Jalar de produccion"}</div>
            <div style={{fontSize:11,color:"#4a6a7a",marginBottom:14}}>Se jalaran datos de todos los ranchos para la fecha seleccionada</div>
            <div><div className="lbl">Fecha</div>
              <input type="date" value={fechaJalar} onChange={function(e){setFechaJalar(e.target.value);}}
                style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"1.5px solid rgba(255,255,255,0.15)",borderRadius:7,padding:"9px",color:"#e8f0e0",fontFamily:"system-ui",fontSize:14,outline:"none",marginBottom:14}}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={function(){setShowJalar(false);}} className="btn btn-gray" style={{flex:1}}>Cancelar</button>
              <button onClick={showJalar==="recibo"?jalarRecibo:jalarProduccion} disabled={jalando}
                className={"btn "+(showJalar==="recibo"?"btn-amb":"btn-blue")} style={{flex:2}}>
                {jalando?"Jalando...":"Jalar"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* PIN */}
      {showPin&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#080f14",border:"2px solid rgba(34,197,94,0.3)",borderRadius:14,padding:"26px 22px",maxWidth:280,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:900,color:"#f0f0e8",marginBottom:4}}>Control de Empaque</div>
            <div style={{fontSize:11,color:"#3a5a3a",marginBottom:18}}>PIN para editar</div>
            <input autoFocus type="password" value={pinVal}
              onChange={function(e){setPinVal(e.target.value);setPinErr(false);}}
              onKeyDown={function(e){if(e.key==="Enter"){if(pinVal===PIN_EDITOR){setAuth(true);setShowPin(false);setPinVal("");}else{setPinErr(true);setPinVal("");}}}}
              style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid "+(pinErr?"#ef4444":"rgba(34,197,94,0.3)"),borderRadius:9,padding:"10px",color:"#22c55e",fontFamily:"Georgia,serif",fontSize:30,textAlign:"center",outline:"none",letterSpacing:6,marginBottom:pinErr?6:12}}/>
            {pinErr&&<div style={{color:"#ef4444",fontSize:11,fontWeight:700,marginBottom:8}}>PIN incorrecto</div>}
            <div style={{display:"flex",gap:7}}>
              <button onClick={function(){setShowPin(false);setPinVal("");setPinErr(false);}} className="btn btn-gray" style={{flex:1}}>Cancelar</button>
              <button onClick={function(){if(pinVal===PIN_EDITOR){setAuth(true);setShowPin(false);setPinVal("");}else{setPinErr(true);setPinVal("");}}} className="btn btn-pri" style={{flex:2}}>Entrar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
