<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<title>Control General de Rendimientos | PVT</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:'Inter',system-ui,sans-serif;background:#07100a;color:#e0ead0;}
::-webkit-scrollbar{width:7px;height:7px;}
::-webkit-scrollbar-thumb{background:rgba(74,222,128,0.25);border-radius:4px;}
input[type=number]::-webkit-inner-spin-button{opacity:1;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade{animation:fadein .3s ease both}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var uS=React.useState, uE=React.useEffect, uM=React.useMemo;
var FB="https://parrasvalley-default-rtdb.firebaseio.com";
var PIN="1986";

// ── helpers ──────────────────────────────────────────────────────────────────
function r2(n){return Math.round(n*100)/100;}
function nv(v){var x=parseFloat(v);return isNaN(x)?0:x;}
function ni(v){var x=parseInt(v);return isNaN(x)?0:x;}
function pct(a,b){return b>0?Math.round(a/b*1000)/10:0;}
function hoy(){var d=new Date();var m=d.getMonth()+1;var dd=d.getDate();return d.getFullYear()+"-"+(m<10?"0":"")+m+"-"+(dd<10?"0":"")+dd;}
function fbGet(k){return fetch(FB+"/"+k+".json").then(function(r){return r.json();}).catch(function(){return null;});}
function fbPatch(k,v){return fetch(FB+"/"+k+".json",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}).catch(function(){});}

// ── configuración ─────────────────────────────────────────────────────────────
var CULTIVOS=["Persa","Slicer","Europeo","Morron","Minibel"];
var CCOLORS={Persa:"#22c55e",Slicer:"#38bdf8",Europeo:"#a78bfa",Morron:"#f97316",Minibel:"#f43f5e"};

var CFG={
  Persa:{
    ranchos:["PVT","Cordillera","Forrajera"],piezas:false,
    calidades:[{id:"pri",label:"1ª Primera",c:"#22c55e"},{id:"seg",label:"2ª Segunda",c:"#60a5fa"},{id:"ter",label:"3ª Tercera",c:"#f59e0b"}],
    calMap:{"Primera":"pri","Segunda":"seg","Tercera":"ter"},
    pres:{
      pri:[{id:"20lb",l:"20 lb",kg:9.25},{id:"8x2",l:"8x2",kg:7.60},{id:"12x1",l:"12x1",kg:5.70}],
      seg:[{id:"20lb",l:"20 lb",kg:9.25},{id:"8x2",l:"8x2",kg:7.60},{id:"12x1",l:"12x1",kg:5.70}],
      ter:[{id:"20lb",l:"20 lb",kg:9.25}]
    },
    presMap:{"20lb":"20lb","8x2":"8x2","12x1":"12x1"}
  },
  Slicer:{
    ranchos:["Forrajera","Cordillera"],piezas:true,
    calidades:[{id:"sup",label:"Superselecto",c:"#22c55e"},{id:"sel",label:"Selecto",c:"#60a5fa"},{id:"cho",label:"Choice/Plain",c:"#f59e0b"}],
    calMap:{"Superselecto":"sup","Super":"sup","Selecto":"sel","Choice":"cho","Plain":"cho","Large":"sel","Small":"cho"},
    pres:{
      sup:[{id:"62ct",l:"62ct",pz:62},{id:"18ct",l:"18ct",pz:18},{id:"24ct",l:"24ct",pz:24},{id:"36ct",l:"36ct",pz:36},{id:"25lb",l:"25 lb",kg:11.57},{id:"50lb",l:"50 lb",kg:23.13}],
      sel:[{id:"18ct",l:"18ct",pz:18},{id:"24ct",l:"24ct",pz:24},{id:"36ct",l:"36ct",pz:36},{id:"25lb",l:"25 lb",kg:11.57},{id:"50lb",l:"50 lb",kg:23.13}],
      cho:[{id:"50lb",l:"50 lb",kg:23.13}]
    },
    presMap:{"62ct":"62ct","18ct":"18ct","24ct":"24ct","36ct":"36ct","25lb":"25lb","50lb":"50lb","62 piezas":"62ct"}
  },
  Europeo:{
    ranchos:["Cordillera"],piezas:true,
    calidades:[{id:"pri",label:"1ª Primera",c:"#22c55e"},{id:"seg",label:"2ª Segunda",c:"#60a5fa"},{id:"ter",label:"3ª Tercera",c:"#f59e0b"}],
    calMap:{"Primera":"pri","Segunda":"seg","Tercera":"ter","Choice":"ter"},
    pres:{
      pri:[{id:"24ct",l:"24ct",pz:24},{id:"12ct",l:"12ct",pz:12},{id:"Bushel",l:"Bushel",kg:27.0}],
      seg:[{id:"24ct",l:"24ct",pz:24},{id:"12ct",l:"12ct",pz:12}],
      ter:[{id:"Bushel",l:"Bushel",kg:27.0},{id:"11b",l:"11B (48pz)",pz:48}]
    },
    presMap:{"24ct":"24ct","12ct":"12ct","Bushel":"Bushel","1/9 bushel":"Bushel","11B":"11b"}
  },
  Morron:{
    ranchos:["Forrajera","Cordillera","Fepo"],piezas:false,
    calidades:[{id:"pri",label:"1ª Primera",c:"#22c55e"},{id:"cho",label:"Choice",c:"#60a5fa"},{id:"ter",label:"Tercera",c:"#f59e0b"}],
    calMap:{"Primera":"pri","Segunda":"pri","Choice":"cho","Tercera":"ter"},
    pres:{
      pri:[{id:"L",l:"L",kg:5.13},{id:"XL",l:"XL",kg:5.13},{id:"Jumbo",l:"Jumbo",kg:5.13},{id:"8x6",l:"8x6",kg:5.44},{id:"25lb",l:"25 lb",kg:11.34}],
      cho:[{id:"25lb",l:"25 lb",kg:11.34},{id:"1/9bushel",l:"1/9 Bushel",kg:9.07}],
      ter:[{id:"25lb",l:"25 lb",kg:11.34}]
    },
    presMap:{"L":"L","XL":"XL","Jumbo":"Jumbo","8x6":"8x6","25lb":"25lb","1/9 bushel":"1/9bushel","11lb":"25lb"}
  },
  Minibel:{
    ranchos:["Cordillera","Forrajera"],piezas:false,
    calidades:[{id:"pri",label:"1ª Primera",c:"#22c55e"},{id:"seg",label:"2ª Segunda",c:"#60a5fa"}],
    calMap:{"Primera":"pri","Segunda":"seg"},
    pres:{
      pri:[{id:"12x8oz",l:"12x8oz",kg:2.88},{id:"12x1lb",l:"12x1lb",kg:5.76},{id:"18lb",l:"18lb",kg:8.16},{id:"rpc35",l:"RPC 35lb",kg:15.87},{id:"rpcverde",l:"Verde RPC",kg:13.61}],
      seg:[{id:"18lb",l:"18lb",kg:8.16}]
    },
    presMap:{"12x8oz":"12x8oz","12x1lb":"12x1lb","18lb":"18lb","RPC 35lb":"rpc35","Verde RPC":"rpcverde"}
  }
};

function getPresKg(cfg, calId, presKey){
  var lista=cfg.pres[calId]||[];
  var p=lista.find(function(x){return x.id===presKey;});
  return p?{kg:p.kg||0,pz:p.pz||0}:{kg:0,pz:0};
}

// ── calcular rendimiento de un rancho ────────────────────────────────────────
function calcRancho(cfg, rejas, pesoReja, piezasReja, prodAcum){
  var kgRec=r2(rejas*pesoReja);
  var pzRec=cfg.piezas?Math.round(rejas*(piezasReja||0)):0;
  var pesoPieza=pzRec>0?kgRec/pzRec:0;
  var detCal={};
  var kgEmpTotal=0;
  cfg.calidades.forEach(function(cal){
    var kgC=0; var pzC=0; var cajasDet={};
    var acum=prodAcum[cal.id]||{};
    Object.keys(acum).forEach(function(presKey){
      var cajas=ni(acum[presKey]);
      var p=getPresKg(cfg,cal.id,presKey);
      var kgP=0; var pzP=0;
      if(p.kg>0){kgP=cajas*p.kg;}
      else if(p.pz>0){pzP=cajas*p.pz;kgP=pzP*pesoPieza;}
      kgC+=kgP; pzC+=pzP;
      cajasDet[presKey]={cajas:cajas,kg:r2(kgP),pz:pzP};
    });
    detCal[cal.id]={kg:r2(kgC),pz:pzC,cajas:cajasDet};
    kgEmpTotal+=kgC;
  });
  kgEmpTotal=r2(kgEmpTotal);
  var kgMerma=r2(kgRec-kgEmpTotal);
  return{
    kgRec:kgRec, pzRec:pzRec, pesoPieza:r2(pesoPieza*1000)/1000,
    kgEmp:kgEmpTotal, kgMerma:kgMerma,
    pctMerma:pct(kgMerma,kgRec),
    factorRend:kgRec>0?Math.round(kgEmpTotal/kgRec*1000)/10:0,
    det:detCal
  };
}

// ── App principal ─────────────────────────────────────────────────────────────
function App(){
  var s1=uS(hoy());   var fecha=s1[0];    var setFecha=s1[1];
  var s2=uS("Persa"); var cultivo=s2[0];  var setCultivo=s2[1];
  var s3=uS("hoy");   var tab=s3[0];      var setTab=s3[1];
  // datos jalados
  var s4=uS({});  var reciboData=s4[0];   var setReciboData=s4[1];
  var s5=uS({});  var prodData=s5[0];     var setProdData=s5[1];
  // inputs manuales por rancho {Persa:{PVT:{pesoReja,piezasReja}}}
  var s6=uS({});  var inputs=s6[0];       var setInputs=s6[1];
  // historial
  var s7=uS({});  var historial=s7[0];    var setHistorial=s7[1];
  // UI state
  var s8=uS("");  var jalando=s8[0];      var setJalando=s8[1];
  var s9=uS("");  var msg=s9[0];          var setMsg=s9[1];
  var s10=uS(false);var auth=s10[0];      var setAuth=s10[1];
  var s11=uS("");  var pinInput=s11[0];   var setPinInput=s11[1];
  var s12=uS(false);var showPin=s12[0];   var setShowPin=s12[1];
  var s13=uS(false);var guardando=s13[0]; var setGuardando=s13[1];

  var cfg=CFG[cultivo];
  var cc=CCOLORS[cultivo];

  // cargar historial al inicio
  uE(function(){
    fbGet("rendimientos-hist-v1").then(function(d){setHistorial(d&&typeof d==="object"?d:{});});
  },[]);

  function setMsg2(m,t){setMsg(m);setTimeout(function(){setMsg("");},t||4000);}

  function getInput(rancho,k){
    return (inputs[cultivo]&&inputs[cultivo][rancho]&&inputs[cultivo][rancho][k])||"";
  }
  function setInput(rancho,k,v){
    setInputs(function(prev){
      var n=Object.assign({},prev);
      if(!n[cultivo])n[cultivo]={};
      n[cultivo]=Object.assign({},n[cultivo]);
      if(!n[cultivo][rancho])n[cultivo][rancho]={};
      n[cultivo][rancho]=Object.assign({},n[cultivo][rancho]);
      n[cultivo][rancho][k]=v;
      return n;
    });
  }

  // ── JALAR RECIBO ────────────────────────────────────────────────────────────
  function jalarRecibo(){
    setJalando("recibo");
    fbGet("recibo-hist-v1").then(function(data){
      if(!data){setJalando("");setMsg2("Sin datos de recibo");return;}
      var arr=Object.values(data);
      var cultNorm=cultivo.toLowerCase();
      var resultado={};
      arr.forEach(function(h){
        if(!h)return;
        var ln=(h.lineaNombre||h.cultivo||"").toLowerCase();
        if(ln!==cultNorm&&ln.replace(/ó/g,"o")!==cultNorm)return;
        var lotes=h.lotes||[];
        lotes.forEach(function(lote){
          if(!lote)return;
          // filtrar por fecha
          var ts=lote.ts||lote.fecha||"";
          var fechaLote="";
          if(ts){
            if(ts.length===10){fechaLote=ts;}
            else{var d=new Date(ts);var m=d.getMonth()+1;var dd=d.getDate();fechaLote=d.getFullYear()+"-"+(m<10?"0":"")+m+"-"+(dd<10?"0":"")+dd;}
          }
          if(fechaLote!==fecha)return;
          var rancho=lote.rancho||"";if(!rancho)return;
          if(!resultado[rancho])resultado[rancho]={rejas:0,malla:""};
          resultado[rancho].rejas+=ni(lote.cajas)||ni(lote.rejas)||0;
          if(lote.malla)resultado[rancho].malla=lote.malla;
        });
      });
      setReciboData(function(prev){
        var n=Object.assign({},prev);
        if(!n[cultivo])n[cultivo]={};
        n[cultivo]=Object.assign({},n[cultivo]);
        Object.keys(resultado).forEach(function(r){
          n[cultivo][r]=Object.assign({},n[cultivo][r]||{},resultado[r]);
        });
        return n;
      });
      setJalando("");
      var cnt=Object.keys(resultado).length;
      setMsg2(cnt>0?"✓ Recibo: "+cnt+" rancho(s) jalados para "+fecha:"Sin datos de recibo para "+fecha);
    }).catch(function(){setJalando("");setMsg2("Error conectando a recibo");});
  }

  // ── JALAR PRODUCCIÓN ────────────────────────────────────────────────────────
  function jalarProduccion(){
    setJalando("prod");
    fbGet("produccion-v1").then(function(data){
      if(!data){setJalando("");setMsg2("Sin datos de producción");return;}
      // produccion-v1 es un objeto plano {pushId: {producto,calidad,presentacion,rancho,malla,cajas,fecha,...}}
      var registros=Object.values(data);
      // agrupar por rancho -> calidad_id -> presentacion_id -> cajas
      var acum={};
      registros.forEach(function(r){
        if(!r||r.producto!==cultivo)return;
        var fechaReg=r.fecha||r.fechaISO||"";
        if(fechaReg!==fecha)return;
        var rancho=r.rancho||"SinRancho";
        var malla=r.malla||"";
        var calId=cfg.calMap[r.calidad]||null;
        var presKey=cfg.presMap[r.presentacion]||null;
        if(!calId||!presKey)return;
        if(!acum[rancho])acum[rancho]={malla:malla};
        if(!acum[rancho][calId])acum[rancho][calId]={};
        acum[rancho][calId][presKey]=(ni(acum[rancho][calId][presKey]||0))+(ni(r.cajas)||0);
      });
      setProdData(function(prev){
        var n=Object.assign({},prev);
        if(!n[cultivo])n[cultivo]={};
        n[cultivo]=Object.assign({},n[cultivo]);
        Object.keys(acum).forEach(function(rancho){
          if(!n[cultivo][rancho])n[cultivo][rancho]={};
          n[cultivo][rancho]=Object.assign({},n[cultivo][rancho],acum[rancho]);
        });
        return n;
      });
      setJalando("");
      var cnt=Object.keys(acum).length;
      setMsg2(cnt>0?"✓ Producción: "+cnt+" rancho(s) jalados para "+fecha:"Sin producción para "+fecha);
    }).catch(function(){setJalando("");setMsg2("Error conectando a producción");});
  }

  // ── CALCULAR TODOS ─────────────────────────────────────────────────────────
  var calculos=uM(function(){
    var res={};
    var reciboC=reciboData[cultivo]||{};
    var prodC=prodData[cultivo]||{};
    // unir ranchos de ambas fuentes
    var ranchosSet={};
    cfg.ranchos.forEach(function(r){ranchosSet[r]=true;});
    Object.keys(reciboC).forEach(function(r){ranchosSet[r]=true;});
    Object.keys(prodC).forEach(function(r){ranchosSet[r]=true;});
    Object.keys(ranchosSet).forEach(function(rancho){
      var rec=reciboC[rancho]||{};
      var prod=prodC[rancho]||{};
      var rejas=ni(rec.rejas)||0;
      var pesoReja=nv(getInput(rancho,"pesoReja"))||0;
      var piezasReja=nv(getInput(rancho,"piezasReja"))||0;
      // construir prodAcum por calidad
      var prodAcum={};
      cfg.calidades.forEach(function(cal){
        prodAcum[cal.id]=prod[cal.id]||{};
      });
      if(rejas>0&&pesoReja>0){
        res[rancho]={malla:rec.malla||prod.malla||"",calc:calcRancho(cfg,rejas,pesoReja,piezasReja,prodAcum)};
      } else if(Object.keys(prodAcum).some(function(k){return Object.keys(prodAcum[k]).length>0;})){
        res[rancho]={malla:rec.malla||prod.malla||"",calc:null,sinRecibo:true};
      }
    });
    return res;
  },[reciboData,prodData,inputs,cultivo,fecha]);

  // totales generales
  var totales=uM(function(){
    var t={kgRec:0,kgEmp:0,kgMerma:0};
    Object.values(calculos).forEach(function(d){
      if(!d.calc)return;
      t.kgRec+=d.calc.kgRec;t.kgEmp+=d.calc.kgEmp;t.kgMerma+=d.calc.kgMerma;
    });
    t.pctMerma=pct(t.kgMerma,t.kgRec);
    t.factorRend=t.kgRec>0?Math.round(t.kgEmp/t.kgRec*1000)/10:0;
    // kg por calidad
    t.detCal={};
    cfg.calidades.forEach(function(cal){
      var kg=0;
      Object.values(calculos).forEach(function(d){if(d.calc&&d.calc.det[cal.id])kg+=d.calc.det[cal.id].kg;});
      t.detCal[cal.id]={kg:r2(kg),pct:pct(r2(kg),t.kgEmp)};
    });
    return t;
  },[calculos,cfg]);

  // ── GUARDAR ─────────────────────────────────────────────────────────────────
  function guardar(){
    if(!auth){setShowPin(true);return;}
    setGuardando(true);
    var entrada={fecha:fecha,cultivo:cultivo,ts:Date.now(),ranchos:{},totales:totales};
    Object.keys(calculos).forEach(function(r){
      if(calculos[r].calc)entrada.ranchos[r]={malla:calculos[r].malla,calc:calculos[r].calc};
    });
    var key="rendimientos-hist-v1/"+fecha.replace(/-/g,"")+"/"+cultivo;
    fbPatch(key,entrada).then(function(){
      setHistorial(function(prev){
        var n=Object.assign({},prev);
        if(!n[fecha.replace(/-/g,"")])n[fecha.replace(/-/g,"")]=  {};
        n[fecha.replace(/-/g,"")][cultivo]=entrada;
        return n;
      });
      setGuardando(false);setMsg2("✓ Guardado en historial");
    });
  }

  // ── ESTILOS BASE ─────────────────────────────────────────────────────────────
  var HDR={background:"linear-gradient(135deg,#051a09 0%,#0a2e12 100%)",padding:"14px 18px",borderBottom:"1px solid rgba(74,222,128,0.12)",position:"sticky",top:0,zIndex:10,boxShadow:"0 2px 12px rgba(0,0,0,0.5)"};
  var BTN=function(c){return{background:c||"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"8px 14px",color:"#e0ead0",fontWeight:700,fontSize:12,cursor:"pointer",transition:"all .15s"};};
  var INP={background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"6px 9px",color:"#e0ead0",fontSize:13,fontFamily:"'DM Mono',monospace",width:80,textAlign:"center",outline:"none"};
  var TD={padding:"8px 10px",fontSize:12,borderBottom:"1px solid rgba(255,255,255,0.05)",verticalAlign:"middle"};
  var TH={padding:"7px 10px",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,color:"#4a6a3a",borderBottom:"1px solid rgba(255,255,255,0.08)",background:"rgba(0,0,0,0.35)",position:"sticky",top:0};

  // ── RENDER ──────────────────────────────────────────────────────────────────
  return(
    <div style={{minHeight:"100vh",background:"#07100a"}}>

      {/* HEADER */}
      <div style={HDR}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div>
            <div style={{fontSize:9,color:"#4a8a5a",fontWeight:700,letterSpacing:3,textTransform:"uppercase"}}>Parras Valley Tomatoes</div>
            <div style={{fontSize:18,fontWeight:900,color:"#a8e063",lineHeight:1.2}}>Control General de Rendimientos</div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
            <input type="date" value={fecha} onChange={function(e){setFecha(e.target.value);}} style={Object.assign({},INP,{width:"auto",padding:"7px 10px"})}/>
            {!auth&&<button onClick={function(){setShowPin(true);}} style={Object.assign({},BTN(),{fontSize:11,padding:"7px 12px"})}>🔒 Editar</button>}
            {auth&&<span style={{fontSize:11,color:"#4ade80",fontWeight:700}}>✓ Editor</span>}
          </div>
        </div>

        {/* Tabs cultivo */}
        <div style={{display:"flex",gap:5,marginTop:10,flexWrap:"wrap"}}>
          {CULTIVOS.map(function(c){
            var on=cultivo===c;
            return <button key={c} onClick={function(){setCultivo(c);}} style={{padding:"5px 12px",borderRadius:6,border:"1px solid "+(on?CCOLORS[c]:"rgba(255,255,255,0.08)"),background:on?"rgba(74,222,128,0.1)":"transparent",color:on?CCOLORS[c]:"#6a7a5a",fontSize:12,fontWeight:700,cursor:"pointer"}}>{c}</button>;
          })}
          <div style={{flex:1}}/>
          <button onClick={function(){setTab("hoy");}} style={{padding:"5px 12px",borderRadius:6,border:"1px solid "+(tab==="hoy"?"rgba(74,222,128,0.5)":"rgba(255,255,255,0.08)"),background:tab==="hoy"?"rgba(74,222,128,0.08)":"transparent",color:tab==="hoy"?"#4ade80":"#6a7a5a",fontSize:11,fontWeight:700,cursor:"pointer"}}>📋 Captura</button>
          <button onClick={function(){setTab("dash");}} style={{padding:"5px 12px",borderRadius:6,border:"1px solid "+(tab==="dash"?"rgba(74,222,128,0.5)":"rgba(255,255,255,0.08)"),background:tab==="dash"?"rgba(74,222,128,0.08)":"transparent",color:tab==="dash"?"#4ade80":"#6a7a5a",fontSize:11,fontWeight:700,cursor:"pointer"}}>📈 Evolución</button>
        </div>
      </div>

      {/* MSG */}
      {!!msg&&<div style={{background:"rgba(74,222,128,0.1)",borderBottom:"1px solid rgba(74,222,128,0.2)",padding:"8px 18px",fontSize:12,color:"#4ade80",fontWeight:600}}>{msg}</div>}

      {/* PIN MODAL */}
      {showPin&&(
        <div onClick={function(e){if(e.target===e.currentTarget)setShowPin(false);}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#0f1f0a",border:"1px solid rgba(74,222,128,0.3)",borderRadius:12,padding:"28px 24px",minWidth:260,textAlign:"center"}}>
            <div style={{fontWeight:800,color:"#a8e063",marginBottom:16,fontSize:15}}>Acceso de Editor</div>
            <input type="password" value={pinInput} onChange={function(e){setPinInput(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&pinInput===PIN){setAuth(true);setShowPin(false);setPinInput("");setMsg2("✓ Acceso concedido");}}} placeholder="PIN" style={Object.assign({},INP,{width:"100%",textAlign:"center",fontSize:18,marginBottom:12})}/>
            <button onClick={function(){if(pinInput===PIN){setAuth(true);setShowPin(false);setPinInput("");setMsg2("✓ Acceso concedido");}else{setMsg2("PIN incorrecto");}}} style={Object.assign({},BTN("rgba(74,222,128,0.15)"),{width:"100%",color:"#4ade80",padding:"10px"})}>Entrar</button>
          </div>
        </div>
      )}

      {/* ════════════════════ TAB HOY ════════════════════ */}
      {tab==="hoy"&&(
        <div style={{padding:"14px 14px 40px"}}>

          {/* Botones jalar + guardar */}
          <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
            <button onClick={jalarRecibo} disabled={!!jalando} style={Object.assign({},BTN("rgba(234,179,8,0.15)"),{borderColor:"rgba(234,179,8,0.3)",color:"#fde047",opacity:jalando?0.5:1})}>
              {jalando==="recibo"?<span>⏳ Jalando recibo...</span>:<span>⬇ Jalar de Recibo</span>}
            </button>
            <button onClick={jalarProduccion} disabled={!!jalando} style={Object.assign({},BTN("rgba(56,189,248,0.12)"),{borderColor:"rgba(56,189,248,0.3)",color:"#38bdf8",opacity:jalando?0.5:1})}>
              {jalando==="prod"?<span>⏳ Jalando producción...</span>:<span>⬇ Jalar de Producción</span>}
            </button>
            <div style={{flex:1}}/>
            {Object.keys(calculos).some(function(r){return calculos[r].calc;})&&(
              <button onClick={guardar} disabled={guardando} style={Object.assign({},BTN("rgba(74,222,128,0.15)"),{borderColor:"rgba(74,222,128,0.3)",color:"#4ade80"})}>
                {guardando?"Guardando...":"💾 Guardar día"}
              </button>
            )}
          </div>

          {/* Inputs peso promedio (header) */}
          <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:"10px 14px",marginBottom:12}}>
            <div style={{fontSize:10,color:"#4a6a3a",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>Captura por rancho — peso y piezas de recibo</div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              {cfg.ranchos.map(function(rancho){
                var rec=(reciboData[cultivo]||{})[rancho]||{};
                var rejas=ni(rec.rejas)||0;
                return(
                  <div key={rancho} style={{background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"10px 12px",minWidth:180}}>
                    <div style={{fontWeight:800,color:cc,fontSize:12,marginBottom:6}}>{rancho} {rec.malla&&<span style={{fontSize:10,color:"#4a6a3a",fontWeight:500}}>· Malla {rec.malla}</span>}</div>
                    <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                      <div>
                        <div style={{fontSize:9,color:"#4a6a3a",marginBottom:2}}>Rejas / Bins</div>
                        <div style={{fontSize:16,fontWeight:900,color:"#f0ead0"}}>{rejas||"—"}</div>
                      </div>
                      <div>
                        <div style={{fontSize:9,color:"#4a6a3a",marginBottom:2}}>Peso/reja (kg)</div>
                        <input type="number" min="0" step="0.1" placeholder="0.0" value={getInput(rancho,"pesoReja")} onChange={function(e){setInput(rancho,"pesoReja",e.target.value);}} style={Object.assign({},INP,{width:72})}/>
                      </div>
                      {cfg.piezas&&<div>
                        <div style={{fontSize:9,color:"#4a6a3a",marginBottom:2}}>Piezas/reja</div>
                        <input type="number" min="0" placeholder="0" value={getInput(rancho,"piezasReja")} onChange={function(e){setInput(rancho,"piezasReja",e.target.value);}} style={Object.assign({},INP,{width:68})}/>
                      </div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Tabla de resultados */}
          {Object.keys(calculos).length===0&&(
            <div style={{textAlign:"center",padding:"48px 0",color:"#2a3a2a",fontSize:14}}>
              <div style={{fontSize:36,marginBottom:10}}>📥</div>
              Presiona "Jalar de Recibo" y "Jalar de Producción" para cargar los datos del día
            </div>
          )}

          {Object.keys(calculos).map(function(rancho){
            var d=calculos[rancho];
            var calc=d.calc;
            return(
              <div key={rancho} className="fade" style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,marginBottom:10,overflow:"hidden"}}>
                {/* sub-header rancho */}
                <div style={{padding:"10px 14px",background:"rgba(0,0,0,0.3)",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <span style={{fontWeight:900,color:cc,fontSize:14}}>{rancho}</span>
                  {d.malla&&<span style={{fontSize:11,color:"#4a6a3a"}}>Malla {d.malla}</span>}
                  {!calc&&<span style={{fontSize:11,color:"#f59e0b",marginLeft:4}}>⚠ Sin recibo o sin peso/reja</span>}
                  {calc&&<>
                    <span style={{fontSize:11,color:"#9ca3af"}}>{calc.kgRec} kg recibidos</span>
                    <span style={{fontSize:11,color:"#4ade80",fontWeight:700,marginLeft:"auto"}}>Factor: {calc.factorRend}%</span>
                    <span style={{fontSize:11,color:(calc.pctMerma>20?"#ef4444":calc.pctMerma>12?"#f59e0b":"#4ade80"),fontWeight:700}}>Merma: {calc.pctMerma}%</span>
                  </>}
                </div>
                {calc&&(
                  <div style={{padding:"8px 6px"}}>
                    {/* Barra apilada */}
                    <div style={{margin:"0 8px 8px",height:20,borderRadius:4,overflow:"hidden",display:"flex",background:"#0a180c"}}>
                      {cfg.calidades.map(function(cal){
                        var d2=calc.det[cal.id]||{kg:0};
                        var p=pct(d2.kg,calc.kgRec);
                        if(p<=0)return null;
                        return <div key={cal.id} style={{width:p+"%",background:cal.c,display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {p>6&&<span style={{fontSize:8,fontWeight:900,color:"#03080a"}}>{p}%</span>}
                        </div>;
                      })}
                      {calc.pctMerma>0&&<div style={{width:Math.min(calc.pctMerma,100)+"%",background:"#ef4444",display:"flex",alignItems:"center",justifyContent:"center"}}>
                        {calc.pctMerma>5&&<span style={{fontSize:8,fontWeight:900,color:"#1a0000"}}>{calc.pctMerma}%</span>}
                      </div>}
                    </div>
                    {/* Tabla calidades */}
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                        <thead>
                          <tr>
                            <th style={TH}>Calidad</th><th style={TH}>Kg empacados</th><th style={TH}>% vs recibido</th><th style={TH}>Piezas</th><th style={TH}>Detalle</th>
                          </tr>
                        </thead>
                        <tbody>
                          {cfg.calidades.map(function(cal){
                            var det=calc.det[cal.id]||{kg:0,pz:0,cajas:{}};
                            var p=pct(det.kg,calc.kgRec);
                            var cajasStr=Object.keys(det.cajas||{}).filter(function(k){return det.cajas[k].cajas>0;}).map(function(k){var c=det.cajas[k];return c.cajas+" "+k;}).join(", ");
                            return(
                              <tr key={cal.id}>
                                <td style={TD}><span style={{fontWeight:700,color:cal.c}}>{cal.label}</span></td>
                                <td style={Object.assign({},TD,{fontFamily:"'DM Mono',monospace",fontWeight:700,color:"#f0ead0"})}>{det.kg>0?det.kg+" kg":"—"}</td>
                                <td style={TD}>
                                  {det.kg>0&&<div style={{display:"flex",alignItems:"center",gap:6}}>
                                    <div style={{width:Math.min(p,100)+"%",maxWidth:80,height:6,background:cal.c,borderRadius:3,minWidth:2}}/>
                                    <span style={{color:cal.c,fontWeight:700}}>{p}%</span>
                                  </div>}
                                  {det.kg<=0&&<span style={{color:"#2a3a2a"}}>—</span>}
                                </td>
                                <td style={Object.assign({},TD,{color:"#6a7a5a",fontFamily:"'DM Mono',monospace"})}>{det.pz>0?det.pz.toLocaleString():"—"}</td>
                                <td style={Object.assign({},TD,{color:"#4a5a3a",fontSize:11})}>{cajasStr||"—"}</td>
                              </tr>
                            );
                          })}
                          {/* Merma */}
                          <tr style={{background:"rgba(239,68,68,0.05)"}}>
                            <td style={TD}><span style={{fontWeight:700,color:"#ef4444"}}>Merma / Diferencia</span></td>
                            <td style={Object.assign({},TD,{fontFamily:"'DM Mono',monospace",fontWeight:700,color:"#ef4444"})}>{calc.kgMerma>0?calc.kgMerma+" kg":calc.kgMerma<0?"−"+Math.abs(calc.kgMerma)+" kg":"—"}</td>
                            <td style={TD}><span style={{color:calc.pctMerma>20?"#ef4444":calc.pctMerma>12?"#f59e0b":"#4ade80",fontWeight:700}}>{calc.pctMerma}%</span></td>
                            <td style={TD}/>
                            <td style={Object.assign({},TD,{fontSize:11,color:"#4a5a3a"})}>Kg recibidos: {calc.kgRec}</td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
                    {/* Métricas adicionales */}
                    <div style={{display:"flex",gap:8,padding:"8px 10px",flexWrap:"wrap"}}>
                      <div style={{background:"rgba(74,222,128,0.06)",borderRadius:6,padding:"6px 10px",textAlign:"center",minWidth:90}}>
                        <div style={{fontSize:9,color:"#4a6a3a",fontWeight:700,letterSpacing:1}}>FACTOR REND.</div>
                        <div style={{fontSize:18,fontWeight:900,color:"#4ade80"}}>{calc.factorRend}<span style={{fontSize:10}}>%</span></div>
                      </div>
                      {cfg.calidades.length>0&&calc.det[cfg.calidades[0].id]&&(
                        <div style={{background:"rgba(34,197,94,0.06)",borderRadius:6,padding:"6px 10px",textAlign:"center",minWidth:90}}>
                          <div style={{fontSize:9,color:"#4a6a3a",fontWeight:700,letterSpacing:1}}>ÍNDICE CALIDAD</div>
                          <div style={{fontSize:18,fontWeight:900,color:"#22c55e"}}>{pct(calc.det[cfg.calidades[0].id].kg,calc.kgEmp)}<span style={{fontSize:10}}>%</span></div>
                          <div style={{fontSize:8,color:"#4a6a3a"}}>1ª / total emp.</div>
                        </div>
                      )}
                      {calc.pesoPieza>0&&<div style={{background:"rgba(168,224,99,0.06)",borderRadius:6,padding:"6px 10px",textAlign:"center",minWidth:90}}>
                        <div style={{fontSize:9,color:"#4a6a3a",fontWeight:700,letterSpacing:1}}>PESO PIEZA</div>
                        <div style={{fontSize:18,fontWeight:900,color:"#a8e063"}}>{calc.pesoPieza}<span style={{fontSize:10}}>kg</span></div>
                      </div>}
                    </div>
                  </div>
                )}
              </div>
            );
          })}

          {/* Totales generales */}
          {totales.kgRec>0&&(
            <div style={{background:"rgba(74,222,128,0.05)",border:"1px solid rgba(74,222,128,0.15)",borderRadius:10,padding:"14px",marginTop:6}}>
              <div style={{fontSize:10,color:"#4a8a5a",fontWeight:900,letterSpacing:1.5,textTransform:"uppercase",marginBottom:10}}>Totales del día — {cultivo}</div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
                {[["Recibido",totales.kgRec+" kg","#9ca3af"],["Empacado",totales.kgEmp+" kg","#4ade80"],["Merma",totales.kgMerma+" kg · "+totales.pctMerma+"%",totales.pctMerma>20?"#ef4444":totales.pctMerma>12?"#f59e0b":"#4ade80"],["Factor Rend.",totales.factorRend+"%","#22c55e"]].map(function(x){
                  return <div key={x[0]} style={{background:"rgba(0,0,0,0.3)",borderRadius:8,padding:"8px 14px",minWidth:100}}>
                    <div style={{fontSize:9,color:"#4a6a3a",fontWeight:700,letterSpacing:1}}>{x[0]}</div>
                    <div style={{fontSize:16,fontWeight:900,color:x[2]}}>{x[1]}</div>
                  </div>;
                })}
              </div>
              {/* Por calidad */}
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {cfg.calidades.map(function(cal){
                  var d=totales.detCal[cal.id]||{kg:0,pct:0};
                  return <div key={cal.id} style={{background:"rgba(0,0,0,0.2)",borderRadius:8,padding:"6px 12px",minWidth:90}}>
                    <div style={{fontSize:9,color:cal.c,fontWeight:700}}>{cal.label}</div>
                    <div style={{fontSize:15,fontWeight:900,color:"#f0ead0"}}>{d.kg} kg</div>
                    <div style={{fontSize:10,color:cal.c,fontWeight:600}}>{d.pct}% del empaque</div>
                  </div>;
                })}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ════════════════════ TAB EVOLUCIÓN ════════════════════ */}
      {tab==="dash"&&(
        <div style={{padding:"14px 14px 40px"}}>
          <div style={{fontSize:10,color:"#4a6a3a",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>Evolución de rendimientos — {cultivo}</div>

          {(function(){
            // ordenar historial por fecha desc
            var dias=Object.keys(historial).sort(function(a,b){return b>a?1:-1;}).slice(0,14);
            var datosCultivo=dias.map(function(k){
              var d=historial[k];
              return d&&d[cultivo]?{fecha:d[cultivo].fecha||k.slice(0,4)+"-"+k.slice(4,6)+"-"+k.slice(6,8),tot:d[cultivo].totales}:null;
            }).filter(Boolean);

            if(datosCultivo.length===0)return(
              <div style={{textAlign:"center",padding:"48px 0",color:"#2a3a2a",fontSize:13}}>
                <div style={{fontSize:36,marginBottom:10}}>📊</div>
                Sin historial guardado aún. Guarda los rendimientos del día desde la pestaña Captura.
              </div>
            );

            var maxKg=Math.max.apply(null,datosCultivo.map(function(d){return d.tot?d.tot.kgRec:0;}))||1;

            return(
              <div>
                {/* Gráfica merma */}
                <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:"14px",marginBottom:12}}>
                  <div style={{fontSize:11,color:"#4a6a3a",fontWeight:700,marginBottom:12}}>% Merma por día (últimos 14 días)</div>
                  <div style={{display:"flex",gap:5,alignItems:"flex-end",height:100,overflowX:"auto"}}>
                    {datosCultivo.slice().reverse().map(function(d,i){
                      if(!d.tot)return null;
                      var p=d.tot.pctMerma||0;
                      var col=p>20?"#ef4444":p>12?"#f59e0b":"#4ade80";
                      return(
                        <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,minWidth:36}}>
                          <span style={{fontSize:9,color:col,fontWeight:700}}>{p}%</span>
                          <div style={{width:28,height:Math.max(p/30*90,3),background:col,borderRadius:"3px 3px 0 0",alignSelf:"flex-end"}}/>
                          <span style={{fontSize:8,color:"#4a5a3a",whiteSpace:"nowrap"}}>{d.fecha.slice(5)}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Gráfica factor rendimiento */}
                <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:"14px",marginBottom:12}}>
                  <div style={{fontSize:11,color:"#4a6a3a",fontWeight:700,marginBottom:12}}>Factor de rendimiento % (kg empacados / kg recibidos)</div>
                  <div style={{display:"flex",gap:5,alignItems:"flex-end",height:100,overflowX:"auto"}}>
                    {datosCultivo.slice().reverse().map(function(d,i){
                      if(!d.tot)return null;
                      var p=d.tot.factorRend||0;
                      var col=p>90?"#4ade80":p>80?"#a8e063":"#f59e0b";
                      return(
                        <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,minWidth:36}}>
                          <span style={{fontSize:9,color:col,fontWeight:700}}>{p}%</span>
                          <div style={{width:28,height:Math.max(p/100*90,3),background:col,borderRadius:"3px 3px 0 0",alignSelf:"flex-end"}}/>
                          <span style={{fontSize:8,color:"#4a5a3a",whiteSpace:"nowrap"}}>{d.fecha.slice(5)}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Índice calidad 1a */}
                {cfg.calidades.length>0&&(
                  <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:"14px",marginBottom:12}}>
                    <div style={{fontSize:11,color:"#4a6a3a",fontWeight:700,marginBottom:12}}>Índice de 1ª calidad % (vs total empacado)</div>
                    <div style={{display:"flex",gap:5,alignItems:"flex-end",height:100,overflowX:"auto"}}>
                      {datosCultivo.slice().reverse().map(function(d,i){
                        if(!d.tot||!d.tot.detCal)return null;
                        var cal1=cfg.calidades[0].id;
                        var kg1=(d.tot.detCal[cal1]||{}).kg||0;
                        var p=pct(kg1,d.tot.kgEmp);
                        var col=p>70?"#22c55e":p>55?"#4ade80":"#f59e0b";
                        return(
                          <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,minWidth:36}}>
                            <span style={{fontSize:9,color:col,fontWeight:700}}>{p}%</span>
                            <div style={{width:28,height:Math.max(p/100*90,3),background:col,borderRadius:"3px 3px 0 0",alignSelf:"flex-end"}}/>
                            <span style={{fontSize:8,color:"#4a5a3a",whiteSpace:"nowrap"}}>{d.fecha.slice(5)}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Tabla resumen histórico */}
                <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,overflow:"hidden"}}>
                  <div style={{fontSize:10,color:"#4a6a3a",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",padding:"10px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>Resumen histórico</div>
                  <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                      <thead>
                        <tr>
                          <th style={TH}>Fecha</th><th style={TH}>Kg Rec.</th><th style={TH}>Kg Emp.</th>
                          {cfg.calidades.map(function(c){return <th key={c.id} style={Object.assign({},TH,{color:c.c})}>{c.label.split(" ")[0]}</th>;})}
                          <th style={Object.assign({},TH,{color:"#ef4444"})}>Merma%</th><th style={TH}>Factor%</th>
                        </tr>
                      </thead>
                      <tbody>
                        {datosCultivo.map(function(d,i){
                          if(!d.tot)return null;
                          var t=d.tot;
                          return(
                            <tr key={i} style={{borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                              <td style={Object.assign({},TD,{fontWeight:700,color:"#9ca3af"})}>{d.fecha}</td>
                              <td style={Object.assign({},TD,{fontFamily:"'DM Mono',monospace"})}>{t.kgRec}</td>
                              <td style={Object.assign({},TD,{fontFamily:"'DM Mono',monospace",color:"#4ade80"})}>{t.kgEmp}</td>
                              {cfg.calidades.map(function(cal){
                                var dc=(t.detCal&&t.detCal[cal.id])||{pct:0,kg:0};
                                return <td key={cal.id} style={Object.assign({},TD,{color:cal.c,fontWeight:700})}>{dc.pct}%</td>;
                              })}
                              <td style={Object.assign({},TD,{fontWeight:700,color:t.pctMerma>20?"#ef4444":t.pctMerma>12?"#f59e0b":"#4ade80"})}>{t.pctMerma}%</td>
                              <td style={Object.assign({},TD,{fontWeight:700,color:t.factorRend>90?"#4ade80":"#f59e0b"})}>{t.factorRend}%</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
